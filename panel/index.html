<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Producción · Innovapack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  :root{
    --bg:#F0EFE9; --panel:#FAFAF8; --panel-2:#ECEAE3; --line:#D8D5CC;
    --card:#FCFBF8; --header-bg:rgba(250,250,248,0.92); --th-text:#000; --badge-bg:#e8f4fd; --badge-text:#1a6fa8;
    --text:#18181B; --text-dim:#71717A; --accent:#0091C7; --accent-text:#fff;
    --accent-dim:#E1F3FA; --good:#15803D; --bad:#B91C1C; --amber:#B45309;
    --brand-blue:#0091C7; --brand-green:#7CB342;
    --grid:#F0EEE9; --axis:#D1D5DB; --chart-lbl:#6B7280;
    --sb-thumb:#a8a293; --sb-thumb-h:#7d7869; --sb-track:rgba(0,0,0,0.04); --row-hover:rgba(0,0,0,0.015);
    --mono:'IBM Plex Mono','SFMono-Regular',Menlo,Consolas,monospace;
    --sans:'Inter','Segoe UI',system-ui,sans-serif;
    --head:'IBM Plex Sans','Inter','Segoe UI',system-ui,sans-serif;
    color-scheme:light;
  }
  [data-theme="dark"]{
    --bg:#0F1115; --panel:#171A21; --panel-2:#20242E; --line:#2C313C;
    --card:#171A21; --header-bg:rgba(15,17,21,0.92); --th-text:#E5E7EB; --badge-bg:#1E3A5F; --badge-text:#93C5FD;
    --text:#E5E7EB; --text-dim:#9AA1AD; --accent:#1CA0D6; --accent-text:#fff;
    --accent-dim:#0C2A33; --good:#4ADE80; --bad:#F87171; --amber:#FBBF24;
    --brand-blue:#26B4E0; --brand-green:#8DC63F;
    --grid:#262B35; --axis:#3A404C; --chart-lbl:#9AA1AD;
    --sb-thumb:#3A404C; --sb-thumb-h:#4E5563; --sb-track:rgba(255,255,255,0.05); --row-hover:rgba(255,255,255,0.04);
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background 0.2s,color 0.2s;}
  #app-root{min-height:100vh;}
  input,select,button{font-family:var(--sans);}
  input,select,textarea{background:var(--card);color:var(--text);}
  input:focus,select:focus{outline:none;border-color:var(--accent)!important;box-shadow:0 0 0 3px rgba(37,99,235,0.1)!important;}
  tr:hover td{background:var(--row-hover);}
  *{scrollbar-width:auto;scrollbar-color:var(--sb-thumb) transparent;}
  ::-webkit-scrollbar{width:15px;height:15px;}
  ::-webkit-scrollbar-track{background:var(--sb-track);border-radius:12px;}
  ::-webkit-scrollbar-thumb{background:var(--sb-thumb);border-radius:12px;border:3px solid transparent;background-clip:content-box;min-height:40px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--sb-thumb-h);background-clip:content-box;}
  /* --- animaciones suaves --- */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .fade-in{animation:fadeInUp 0.35s cubic-bezier(0.16,1,0.3,1) both;}
  .fade-in-soft{animation:fadeIn 0.3s ease both;}
  button{transition:background 0.15s ease,color 0.15s ease,box-shadow 0.15s ease,transform 0.1s ease,border-color 0.15s ease;}
  button:active{transform:scale(0.97);}
  select,input{transition:border-color 0.15s ease,box-shadow 0.15s ease,background 0.2s ease;}
  path,rect,circle,line{transition:opacity 0.15s ease;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Módulos compartidos (cargan ANTES del script de la app) -->
<script src="../shared/data.js?v=20260712z4"></script>
<script src="../shared/config.js?v=20260712z4"></script>
<script src="../shared/inventario_base.js?v=20260712z4"></script>
<script src="../shared/sku_maestro.js?v=20260712z4"></script>
<script src="../shared/pedidos_base.js?v=20260712z4"></script>
<script src="../shared/calculos.js?v=20260723a"></script>
</head>
<body>
<div id="app-root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* Endpoint Apps Script (deployment con el código NUEVO: reportes + config).
   Usamos el mismo que ya quedó actualizado y funcionando, para no depender de
   identificar cuál de las muchas implementaciones "Sin título" corresponde. */
const SHEETS_URL_READ = "https://script.google.com/macros/s/AKfycbxAWxEyCh6W8j6iMytZ3-hHgcjrSOEAAREtCJn7BSetzZ0QiiwDzdHvzOhiojkO3iYIeQ/exec";
window.__CONFIG_URL = SHEETS_URL_READ; // el panel lee reportes y lee/ESCRIBE la config compartida

const inputStyle = {
  width:"100%", padding:"10px 13px", background:"var(--card)", border:"1px solid var(--line)",
  borderRadius:9, color:"var(--text)", fontSize:14, fontFamily:"var(--sans)", outline:"none",
  boxShadow:"0 1px 2px rgba(0,0,0,0.04)", transition:"border-color 0.15s, box-shadow 0.15s"
};

function Logo(){
  return (
    <div style={{display:"flex",alignItems:"center",gap:14}}>
      <img src="../shared/logo.png" alt="Innovapack" onError={e=>{e.target.style.display='none';}}
        className="logo-img" style={{height:44,width:"auto",objectFit:"contain"}}/>
      <div style={{fontFamily:"var(--head)",fontSize:18,color:"var(--text)",fontWeight:900,letterSpacing:"0.02em"}}>
        PANEL DE PRODUCCIÓN
      </div>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(4px)"}}>
      <div style={{background:"var(--card)",borderRadius:16,padding:26,width:"100%",maxWidth:700,maxHeight:"82vh",display:"flex",flexDirection:"column",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,paddingBottom:16,borderBottom:"1px solid var(--line)"}}>
          <div style={{fontWeight:700,fontSize:15}}>{title}</div>
          <button onClick={onClose} style={{background:"var(--panel-2)",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:14,color:"var(--text-dim)"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1}}>{children}</div>
      </div>
    </div>
  );
}

function PinGate({onUnlock}){
  const [pin,setPin]=useState(""); const [err,setErr]=useState(""); const [checking,setChecking]=useState(false);
  async function check(e){
    e.preventDefault(); setErr(""); setChecking(true);
    /* Validación local — no depende del servidor */
    const ok = (pin === "072026");
    setChecking(false);
    if(ok) onUnlock(pin); else setErr("PIN incorrecto.");
  }
  return (
    <form onSubmit={check} style={{maxWidth:320,margin:"80px auto",textAlign:"center"}}>
      <div style={{fontSize:13,color:"var(--text-dim)",marginBottom:14,textTransform:"uppercase",letterSpacing:"0.05em",fontFamily:"var(--mono)"}}>Panel privado</div>
      <input style={{...inputStyle,textAlign:"center",letterSpacing:"0.3em",fontSize:18}} value={pin} onChange={e=>setPin(e.target.value)} placeholder="PIN" type="password" autoFocus/>
      {err && <div style={{color:"var(--bad)",fontSize:13,marginTop:10}}>{err}</div>}
      <button type="submit" disabled={checking} style={{marginTop:16,background:"var(--accent)",color:"var(--accent-text)",border:"none",borderRadius:8,padding:"11px 24px",fontWeight:700,cursor:checking?"default":"pointer",opacity:checking?0.7:1}}>{checking?"Verificando…":"Entrar"}</button>
    </form>
  );
}

function StatCard({label,value,accent,borderColor,breakdown,trend,highlight}){
  const [open,setOpen]=useState(false);
  const hlBg=highlight==="bad"?"#FEE2E2":highlight==="amber"?"#FEF3C7":highlight==="good"?"#DCFCE7":null;
  return (
    <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"18px 20px",borderLeft:`3px solid ${borderColor||"var(--line)"}`,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
      <div style={{fontSize:10.5,color:"var(--text-dim)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>{label}</div>
      {hlBg
        ? <div style={{display:"inline-block",fontSize:30,fontWeight:800,fontFamily:"var(--mono)",color:accent||"var(--text)",background:hlBg,borderRadius:10,padding:"3px 12px",marginBottom:6,letterSpacing:"-0.02em"}}>{value}</div>
        : <div style={{fontSize:26,fontWeight:600,fontFamily:"var(--mono)",color:accent||"var(--text)",marginBottom:5,letterSpacing:"-0.02em"}}>{value}</div>}
      {trend && <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:breakdown?8:0}}>{trend}</div>}
      {breakdown && (
        <>
          <button onClick={()=>setOpen(!open)} style={{background:"none",border:"1px solid var(--line)",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer",color:"var(--text-dim)",marginTop:4}}>{open?"▲ Ocultar":"▼ Por máquina"}</button>
          {open && (
            <div style={{marginTop:10}}>
              {breakdown.map(({maquina,val,pct,detail})=>(
                <div key={maquina} style={{padding:"7px 0",borderBottom:"1px solid var(--line)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10}}>
                    <span style={{color:"var(--text-dim)",fontWeight:500,fontSize:12}}>{maquina}</span>
                    <span style={{fontWeight:700,fontFamily:"var(--mono)",fontSize:13,color:accent||"var(--text)",whiteSpace:"nowrap"}}>{typeof val==="number"?val.toLocaleString():val}{pct!==null&&pct!==undefined?<span style={{color:"var(--text-dim)",fontWeight:500,marginLeft:5}}>({pct}%)</span>:""}</span>
                  </div>
                  {detail && <div style={{fontSize:10.5,color:"var(--text-dim)",fontFamily:"var(--mono)",marginTop:2}}>{detail}</div>}
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

function UtilBar({val,hi,lo}){
  if(!val||val==="-") return <span style={{color:"var(--text-dim)"}}>-</span>;
  const p=parseInt(val);
  const color=p>=hi?"var(--good)":p>=lo?"var(--amber)":"var(--bad)";
  const bg=p>=hi?"#DCFCE7":p>=lo?"#FEF3C7":"#FEE2E2";
  return(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{background:bg,color,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600,minWidth:42,textAlign:"center"}}>{val}</span>
      <div style={{flex:1,height:5,background:"var(--panel-2)",borderRadius:4,overflow:"hidden",minWidth:40}}>
        <div style={{width:val,height:"100%",background:color,borderRadius:4}}></div>
      </div>
    </div>
  );
}

function RendBar({rend}){
  if(rend===null||rend===undefined) return <span style={{color:"var(--text-dim)"}}>-</span>;
  const color=rend>=90?"var(--good)":rend>=70?"var(--amber)":"var(--bad)";
  const bg=rend>=90?"#DCFCE7":rend>=70?"#FEF3C7":"#FEE2E2";
  return(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{background:bg,color,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600,minWidth:42,textAlign:"center"}}>{rend}%</span>
      <div style={{flex:1,height:5,background:"var(--panel-2)",borderRadius:4,overflow:"hidden",minWidth:40}}>
        <div style={{width:rend+"%",height:"100%",background:color,borderRadius:4}}></div>
      </div>
    </div>
  );
}


/* Producción total separada: Kg Prod.Terminado / Kg Prod.Proceso / Unidades */
function ProdCard({reports}){
  const [open,setOpen]=useState(false);
  const ALLM = MAQUINAS_KG.concat(MAQUINAS_UND);
  // Kg por bodega: TODAS las máquinas (las selladoras convierten unidades→kg por peso de referencia).
  const repsPT = reports.filter(r=>clasificarReporte(r).bodega==="Producto Terminado");
  const repsPP = reports.filter(r=>clasificarReporte(r).bodega==="Producto en Proceso");
  const repsUnd= reports.filter(r=>MAQUINAS_UND.includes(r.maquina));
  const sumKg = list => Math.round(list.reduce((s,r)=>s+produccionKg(r),0));
  const totalKgPT=sumKg(repsPT), totalKgPP=sumKg(repsPP);
  const totalUnd=repsUnd.reduce((s,r)=>s+(Number(r.produccion)||0),0);
  const totalUndKg=Math.round(repsUnd.reduce((s,r)=>s+produccionKg(r),0)); // kg equiv. de las unidades (ya incluidos en los kg de arriba)
  const bdKg = (list)=> ALLM.map(m=>({maquina:m,val:Math.round(list.filter(r=>r.maquina===m).reduce((s,r)=>s+produccionKg(r),0))})).filter(x=>x.val>0);
  const bdKgPT=bdKg(repsPT), bdKgPP=bdKg(repsPP);
  const bdUnd=MAQUINAS_UND.map(m=>({maquina:m,val:repsUnd.filter(r=>r.maquina===m).reduce((s,r)=>s+(Number(r.produccion)||0),0)})).filter(x=>x.val>0);
  const row=(label,val,unit)=>(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
      <span style={{fontSize:12.5,color:"var(--text-dim)",fontWeight:500}}>{label}</span>
      <span style={{fontSize:18,fontWeight:600,fontFamily:"var(--mono)",color:"var(--good)"}}>{val.toLocaleString()}</span>
    </div>
  );
  const section=(title,arr,unit)=> arr.length>0 && (
    <>
      <div style={{fontSize:10,fontWeight:700,color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.06em",padding:"8px 0 4px",borderBottom:"2px solid var(--line)"}}>{title}</div>
      {arr.map(({maquina,val})=>(
        <div key={maquina} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10,fontSize:12,padding:"5px 0",borderBottom:"1px solid var(--line)"}}>
          <span style={{color:"var(--text-dim)",fontWeight:500}}>{maquina}</span>
          <span style={{fontWeight:600,fontFamily:"var(--mono)",color:"var(--good)",whiteSpace:"nowrap"}}>{val.toLocaleString()} {unit}</span>
        </div>
      ))}
    </>
  );
  return(
    <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"18px 20px",borderLeft:"3px solid var(--good)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
      <div style={{fontSize:10.5,color:"var(--text-dim)",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>Producción total</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:8}}>
        {row("Kg · Prod. Terminado",totalKgPT)}
        {row("Kg · Prod. en Proceso",totalKgPP)}
        <div style={{height:1,background:"var(--line)"}}></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
          <div style={{display:"flex",flexDirection:"column"}}>
            <span style={{fontSize:12.5,color:"var(--text-dim)",fontWeight:500}}>Unidades</span>
            {totalUndKg>0 && <span style={{fontSize:11,color:"var(--text-dim)"}}>≈ {totalUndKg.toLocaleString()} kg (ya sumados en los Kg de arriba)</span>}
          </div>
          <span style={{fontSize:18,fontWeight:600,fontFamily:"var(--mono)",color:"var(--good)"}}>{totalUnd.toLocaleString()}</span>
        </div>
      </div>
      <button onClick={()=>setOpen(!open)} style={{background:"none",border:"1px solid var(--line)",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer",color:"var(--text-dim)",marginTop:4}}>{open?"▲ Ocultar":"▼ Por máquina"}</button>
      {open && <div style={{marginTop:10}}>{section("Kg · Producto Terminado",bdKgPT,"kg")}{section("Kg · Producto en Proceso",bdKgPP,"kg")}{section("Unidades",bdUnd,"und")}</div>}
    </div>
  );
}

/* ---------- Gráficas ---------- */
function DonutDash({data,title,unidad}){
  const total=data.reduce((s,d)=>s+d.val,0);
  const [hovered,setHovered]=useState(null);
  if(total===0) return <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:180,color:"var(--text-dim)",fontSize:13}}>{title}: sin datos</div>;
  const COLORS=["#3B82F6","#16A34A","#D97706","#8B5CF6","#DC2626","#06B6D4","#EC4899","#84CC16"];
  const u = unidad ? " "+unidad : "";
  let cum=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const angle=(d.val/total)*2*Math.PI;
    const x1=70+55*Math.cos(cum),y1=70+55*Math.sin(cum); cum+=angle;
    const x2=70+55*Math.cos(cum),y2=70+55*Math.sin(cum);
    const large=angle>Math.PI?1:0;
    const path=data.length===1?`M70,15 A55,55 0 1,1 69.999,15 Z`:`M70,70 L${x1},${y1} A55,55 0 ${large},1 ${x2},${y2} Z`;
    return {path,color:COLORS[i%COLORS.length],label:d.label,val:d.val,pct:Math.round((d.val/total)*100)};
  });
  const hov=hovered!==null?slices[hovered]:null;
  return(
    <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"16px 20px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",borderTop:"3px solid var(--brand-blue)"}}>
      <div style={{fontSize:12.5,fontWeight:700,marginBottom:12,fontFamily:"var(--head)"}}>{title}</div>
      <div style={{display:"flex",gap:16,alignItems:"center"}}>
        <svg width="140" height="140" viewBox="0 0 140 140" style={{flexShrink:0,cursor:"pointer"}}>
          {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="var(--card)" strokeWidth="2" opacity={hovered===null||hovered===i?1:0.45} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)} style={{transition:"opacity 0.15s"}}/>)}
          <circle cx="70" cy="70" r="30" fill="var(--card)"/>
          {hov?<>
            <text x="70" y="62" textAnchor="middle" fontSize="8.5" fill="var(--text-dim)">{hov.label.length>13?hov.label.substring(0,12)+"…":hov.label}</text>
            <text x="70" y="76" textAnchor="middle" fontSize="12" fontWeight="600" fill={hov.color}>{hov.pct}%</text>
            <text x="70" y="88" textAnchor="middle" fontSize="9" fill="var(--text-dim)">{hov.val.toLocaleString()+u}</text>
          </>:<>
            <text x="70" y="67" textAnchor="middle" fontSize="9" fill="var(--chart-lbl)">Total</text>
            <text x="70" y="80" textAnchor="middle" fontSize="11" fontWeight="600" fill="var(--text)">{total.toLocaleString()}</text>
          </>}
        </svg>
        <div style={{flex:1}}>
          {slices.map((s,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5,cursor:"pointer",opacity:hovered===null||hovered===i?1:0.45,transition:"opacity 0.15s"}} onMouseEnter={()=>setHovered(i)} onMouseLeave={()=>setHovered(null)}>
              <div style={{width:8,height:8,borderRadius:2,background:s.color,flexShrink:0}}></div>
              <span style={{fontSize:11,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
              <span style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",fontFamily:"var(--mono)"}}>{s.val.toLocaleString()}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function BarChartDash({data,title,color,labelKey,valueKey,unidad,sub}){
  const [hi,setHi]=useState(null);
  if(!data||data.length===0) return <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:200,color:"var(--text-dim)",fontSize:13}}>{title}: sin datos</div>;
  const max=Math.max(...data.map(d=>d[valueKey]),1);
  const W=440,H=214,padL=40,padB=56,padT=22,padR=10;
  const chartW=W-padL-padR,chartH=H-padB-padT;
  const barW=Math.max(8,Math.floor(chartW/data.length)-4);
  const u=unidad?" "+unidad:"";
  const hov=hi!==null?data[hi]:null;
  return(
    <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"16px 20px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",borderTop:"3px solid var(--brand-blue)"}}>
      <div style={{fontSize:12.5,fontWeight:700,marginBottom:sub?3:12,fontFamily:"var(--head)"}}>{title}</div>
      {sub && <div style={{fontSize:10.5,color:"var(--text-dim)",marginBottom:10}}>{sub}</div>}
      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{cursor:"pointer"}}>
        {[0,0.25,0.5,0.75,1].map(t=>(
          <g key={t}>
            <line x1={padL} y1={padT+chartH*(1-t)} x2={padL+chartW} y2={padT+chartH*(1-t)} stroke="var(--grid)" strokeWidth="1"/>
            <text x={padL-4} y={padT+chartH*(1-t)+4} textAnchor="end" fontSize="9" fill="var(--chart-lbl)">{Math.round(max*t).toLocaleString()}</text>
          </g>
        ))}
        {data.map((d,i)=>{
          const bH=Math.max(2,(d[valueKey]/max)*chartH);
          const x=padL+(i/data.length)*chartW+(chartW/data.length-barW)/2;
          const y=padT+chartH-bH;
          return(<g key={i} onMouseEnter={()=>setHi(i)} onMouseLeave={()=>setHi(null)}>

/* Fecha ISO (yyyy-mm-dd) → dd/mm (eje) y dd/mm/yyyy (tooltip). */
function fechaCorta(iso){ return (iso && iso.length>=10) ? iso.slice(8,10)+"/"+iso.slice(5,7) : iso; }
function fechaLarga(iso){ return (iso && iso.length>=10) ? iso.slice(8,10)+"/"+iso.slice(5,7)+"/"+iso.slice(0,4) : iso; }

/* Eficiencia (topada por turno físico) para CUALQUIER lista de reportes. */
function eficienciaLista(list){
  const porTurno={};
  list.forEach(r=>{
    const key=getFechaISO(r)+"|"+(r.turno||"")+"|"+(r.maquina||"");
    const u=calcUtilizacion(r);
    if(!porTurno[key]) porTurno[key]={dur:0,prod:0};
    if(u){ porTurno[key].dur=u.duracionTurno; porTurno[key].prod+=u.tiempoProductivo; }
  });
  const prog=Object.values(porTurno).reduce((s,d)=>s+d.dur,0);
  const prod=Object.values(porTurno).reduce((s,d)=>s+Math.min(d.prod,d.dur),0);
  return {prog,prod,pct:prog>0?Math.min(100,Math.round((prod/prog)*100)):null};
}

/* Tarjeta comparativa entre dos periodos con flecha ▲/▼.
   invert=true → subir es MALO (merma, tiempos muertos). */
function CompareCard({label,cur,prev,unidad,invert}){
  const fmt=v=>v==null?"—":Number(v).toLocaleString()+(unidad||"");
  let delta=null, up=null;
  if(cur!=null&&prev!=null&&prev!==0){ delta=Math.round(((cur-prev)/Math.abs(prev))*1000)/10; up=cur>=prev; }
  const bueno = up==null?null:(invert?!up:up);
  const col = bueno==null?"var(--text-dim)":bueno?"var(--good)":"var(--bad)";
  return (
    <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,padding:"14px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

        <div style={{fontSize:22,fontWeight:700,fontFamily:"var(--mono)"}}>{fmt(cur)}</div>
        {delta!=null && <span style={{fontSize:12.5,fontWeight:700,color:col}}>{up?"▲":"▼"} {Math.abs(delta)}%</span>}
      </div>
      <div style={{fontSize:10.5,color:"var(--text-dim)",marginTop:3}}>últ. 7 días · antes: {fmt(prev)}</div>
    </div>
  );
}

/* ===== ORDENAMIENTO POR ENCABEZADO (flecha) — reutilizable en todos los cuadros ===== */
function useSort(defKey, defDir){
  const [key,setKey]=useState(defKey||null);
  const [dir,setDir]=useState(defDir||'desc');
  const on=(k)=>{ if(key===k){ setDir(d=>d==='asc'?'desc':'asc'); } else { setKey(k); setDir('asc'); } };
  return {key,dir,on};
}
function aplicarOrden(rows, sort, getVal){
  if(!sort || !sort.key) return rows;
  const arr=[...rows].sort((a,b)=>{
    let A=getVal(a,sort.key), B=getVal(b,sort.key);
    const nA=(A===''||A==null), nB=(B===''||B==null);
    if(nA&&nB) return 0; if(nA) return 1; if(nB) return -1;
    if(typeof A==='number' && typeof B==='number') return A-B;
    return String(A).localeCompare(String(B),'es',{numeric:true,sensitivity:'base'});
  });
  return sort.dir==='desc' ? arr.reverse() : arr;
}
/* Encabezado ordenable: clic alterna asc/desc y muestra la flecha. */
function ThSort({label, k, sort, extra}){
  const active=sort.key===k;
  return (
    <th onClick={()=>sort.on(k)} title="Clic para ordenar"
      style={{padding:"9px 10px",color:active?"var(--accent)":"var(--th-text)",fontWeight:700,whiteSpace:"nowrap",cursor:"pointer",userSelect:"none",position:"sticky",top:0,background:"var(--panel-2)",...(extra||{})}}>
      {label} <span style={{opacity:active?1:0.35,fontSize:10,marginLeft:2}}>{active?(sort.dir==='asc'?'▲':'▼'):'↕'}</span>
    </th>
  );
}

  });
  const activeFH=[hMaquina,hOperario,hTurno,hDesde,hHasta].filter(Boolean).length;
  function clearFH(){setHMaquina("");setHOperario("");setHTurno("");setHDesde("");setHHasta("");}

  /* ---- KPIs (calculados sobre fr) ---- */
  const totalMerma=fr.reduce((s,r)=>s+sumNumeros(r.mermasCantidad),0);
  const rmMerma=resumenMerma(fr); // merma % (merma kg ÷ producción kg)
  const totalTM=fr.reduce((s,r)=>s+sumNumeros(r.tiemposMuertosMinutos),0);
  const MAQ=MAQUINAS_KG.concat(MAQUINAS_UND);
  const bdMerma=MAQ.map(m=>{const list=fr.filter(r=>r.maquina===m);return{maquina:m,val:list.reduce((s,r)=>s+sumNumeros(r.mermasCantidad),0),pct:resumenMerma(list).pct};}).filter(x=>x.val>0);
  const bdTM=MAQ.map(m=>{const list=fr.filter(r=>r.maquina===m);const prog=eficienciaDe(list).prog;const val=list.reduce((s,r)=>s+sumNumeros(r.tiemposMuertosMinutos),0);return{maquina:m,val,pct:prog>0?Math.round((val/prog)*100):null};}).filter(x=>x.val>0);
  const bdReportes=MAQ.map(m=>({maquina:m,val:fr.filter(r=>r.maquina===m).length})).filter(x=>x.val>0);

  /* ---- Resumen + eficiencia por máquina (sobre fr) ----
     Se agrupa por TURNO FÍSICO (fecha + turno) y se TOPAN las horas
     productivas al límite de cada turno. Así, por más reportes que un
     operario ingrese en un mismo turno de (p.ej.) 8h, ese turno jamás
     aporta más de 8h. Esto corrige el sobreconteo (24h en un turno de 8h). */
  function eficienciaDe(list){
    const porTurno={};
    list.forEach(r=>{
      const key=getFechaISO(r)+"|"+(r.turno||"");
      const u=calcUtilizacion(r);
      if(!porTurno[key]) porTurno[key]={dur:0,prod:0};
      if(u){ porTurno[key].dur=u.duracionTurno; porTurno[key].prod+=u.tiempoProductivo; }
    });
    const prog=Object.values(porTurno).reduce((s,d)=>s+d.dur,0);
    // TOPE por turno: las horas productivas nunca exceden la duración del turno
    const prod=Object.values(porTurno).reduce((s,d)=>s+Math.min(d.prod,d.dur),0);
    return {prog,prod,pct:prog>0?Math.min(100,Math.round((prod/prog)*100)):null};
  }
  const byMaq=MAQ.map(m=>{
    const rs=fr.filter(r=>r.maquina===m);
    const ef=eficienciaDe(rs);
    const prodTotal=rs.reduce((s,r)=>s+(Number(r.produccion)||0),0);
    const meta=metas[m];
    const horasProd=ef.prod/60; // horas productivas reales (ya topadas por turno)
    // Rendimiento a nivel de máquina: producción total ÷ horas productivas reales
    let rend=null, rendReal=null;
    if(horasProd>0 && meta){ rendReal=Math.round(prodTotal/horasProd); rend=Math.round((rendReal/meta.meta)*100); }
    return {maquina:m,reportes:rs.length,prod:prodTotal,
      merma:rs.reduce((s,r)=>s+sumNumeros(r.mermasCantidad),0),tm:rs.reduce((s,r)=>s+sumNumeros(r.tiemposMuertosMinutos),0),
      rend,rendReal,metaStr:meta?`${meta.meta.toLocaleString()} ${meta.unidad}`:"-",
      progMin:ef.prog,prodMin:ef.prod,
      horasProg:(ef.prog/60).toFixed(1)+"h",horasProd:(ef.prod/60).toFixed(1)+"h",eficiencia:ef.pct};
  });
  // Eficiencia global PONDERADA (total horas productivas ÷ total horas programadas)
  const totalProgMin=byMaq.reduce((s,x)=>s+x.progMin,0);
  const totalProdMin=byMaq.reduce((s,x)=>s+x.prodMin,0);
  const avgEfic=totalProgMin>0?Math.round((totalProdMin/totalProgMin)*100)+"%":"-";
  const tmPct=totalProgMin>0?Math.round((totalTM/totalProgMin)*1000)/10:null; // % de tiempo muerto vs tiempo programado
  const bdEfic=byMaq.map(x=>({maquina:x.maquina,val:x.eficiencia!==null?x.eficiencia+"%":"-",detail:x.eficiencia!==null?`${x.horasProd} prod · ${x.horasProg} prog`:""})).filter(x=>x.val!=="-");
  const totalTMh=(totalTM/60).toFixed(1), totalProgH=(totalProgMin/60).toFixed(1), totalProdH=(totalProdMin/60).toFixed(1);

  /* ---- Datos de gráficas (sobre fr) ---- */
  const byDayKg={}, byDayUnd={};
  fr.forEach(r=>{const d=getFechaISO(r);if(!d)return;
    const pk=produccionKg(r); if(pk>0) byDayKg[d]=(byDayKg[d]||0)+pk;   // TODAS las máquinas (selladoras convertidas a kg)
    if(MAQUINAS_UND.includes(r.maquina)) byDayUnd[d]=(byDayUnd[d]||0)+(Number(r.produccion)||0);
  });
  const prodByDayKg=Object.entries(byDayKg).sort().map(([d,v])=>({label:fechaCorta(d),full:fechaLarga(d),val:Math.round(v)}));
  const prodByDayUnd=Object.entries(byDayUnd).sort().map(([d,v])=>({label:fechaCorta(d),full:fechaLarga(d),val:v}));
  const mermaByDay={}; fr.forEach(r=>{const d=getFechaISO(r);if(d)mermaByDay[d]=(mermaByDay[d]||0)+sumNumeros(r.mermasCantidad);});
  const mermaByDayArr=Object.entries(mermaByDay).sort().map(([d,v])=>({label:fechaCorta(d),full:fechaLarga(d),val:v}));
  const mermaPorMaq=MAQ.map(m=>({label:m,val:fr.filter(r=>r.maquina===m).reduce((s,r)=>s+sumNumeros(r.mermasCantidad),0)})).filter(d=>d.val>0);
  /* Torta separada Kg / Unidades.
     Kg: TODAS las máquinas (las selladoras convierten sus unidades a kg con el
     peso por referencia vía produccionKg). */
  const donutKg=MAQ.map(m=>({label:m,val:Math.round(fr.filter(r=>r.maquina===m).reduce((s,r)=>s+produccionKg(r),0))})).filter(d=>d.val>0);
  const donutUnd=MAQUINAS_UND.map(m=>({label:m,val:fr.filter(r=>r.maquina===m).reduce((s,r)=>s+(Number(r.produccion)||0),0)})).filter(d=>d.val>0);

  /* ---- Comparativo de periodos (últ. 7 días vs. 7 previos) ---- */
  const frNoDate=reports.filter(r=>{
    if(fMaquina&&r.maquina!==fMaquina)return false;
    if(fOperario&&r.nombre!==fOperario)return false;
    if(fTurno&&r.turno!==fTurno)return false;
    return true;
  });
  const isoAgo=n=>{const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);};
  const hoyISO=isoAgo(0), d7=isoAgo(7), d14=isoAgo(14);
  const cur7=frNoDate.filter(r=>{const i=getFechaISO(r);return i&&i>d7&&i<=hoyISO;});
  const prev7=frNoDate.filter(r=>{const i=getFechaISO(r);return i&&i>d14&&i<=d7;});
  const sumKg=list=>Math.round(list.reduce((s,r)=>s+produccionKg(r),0));
  const cmpProdCur=sumKg(cur7), cmpProdPrev=sumKg(prev7);
  const cmpEfCur=eficienciaLista(cur7).pct, cmpEfPrev=eficienciaLista(prev7).pct;
  const cmpMeCur=resumenMerma(cur7).pct, cmpMePrev=resumenMerma(prev7).pct;
  const cmpTmCur=cur7.reduce((s,r)=>s+sumNumeros(r.tiemposMuertosMinutos),0), cmpTmPrev=prev7.reduce((s,r)=>s+sumNumeros(r.tiemposMuertosMinutos),0);
  const hayComp=cur7.length>0||prev7.length>0;

  /* ---- Tendencia de eficiencia por día (respeta filtros) ---- */
  const diasEf=[...new Set(fr.map(getFechaISO).filter(Boolean))].sort();
  const efTrend=diasEf.map(d=>({label:fechaCorta(d),full:fechaLarga(d),val:eficienciaLista(fr.filter(r=>getFechaISO(r)===d)).pct||0}));

  /* ---- Top motivos de tiempo muerto ---- */
  const topTM=tmPorMotivo(fr).slice(0,8).map(x=>({label:x.motivo,val:x.min}));

  const selStyle={...inputStyle,fontSize:12,padding:"7px 10px"};
  const fmtMC=r=>r.mermasCantidad||"-", fmtMM=r=>r.mermasMotivo||"-", fmtTMin=r=>r.tiemposMuertosMinutos||"-", fmtTM=r=>r.tiemposMuertosMotivo||"-";

  return(
    <div>
      {/* Barra de filtros GLOBAL */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:700,fontFamily:"var(--head)"}}>Resumen general {activeF>0 && <span style={{fontSize:12,fontWeight:500,color:"var(--accent)"}}>· filtrado</span>}</div>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          {favs.length>0 && <select onChange={e=>{const fv=favs.find(x=>x.nombre===e.target.value);aplicarFav(fv);e.target.value="";}} defaultValue="" style={{...selStyle,maxWidth:160}}><option value="">⭐ Favoritos…</option>{favs.map(fv=><option key={fv.nombre} value={fv.nombre}>{fv.nombre}</option>)}</select>}
          <button onClick={guardarFav} title="Guardar el filtro actual como favorito" style={{background:"var(--panel-2)",color:"var(--text)",border:"1px solid var(--line)",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>⭐ Guardar</button>
          {activeF>0 && <button onClick={clearF} style={{background:"#FEE2E2",color:"var(--bad)",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Limpiar ({activeF})</button>}
          <button onClick={()=>setShowFilter(!showFilter)} style={{background:showFilter||activeF>0?"var(--accent)":"var(--panel-2)",color:showFilter||activeF>0?"#fff":"var(--text-dim)",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{showFilter?"▲ Ocultar":"▼ Filtrar"}{activeF>0?` (${activeF})`:""}</button>
        </div>
      </div>
      {showFilter && (
        <div style={{background:"var(--card)",border:"1px solid var(--line)",borderRadius:12,padding:16,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:16}}>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Máquina</div><select style={selStyle} value={fMaquina} onChange={e=>setFMaquina(e.target.value)}><option value="">Todas</option>{maquinas.filter(Boolean).map(m=><option key={m} value={m}>{m}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Operario</div><select style={selStyle} value={fOperario} onChange={e=>setFOperario(e.target.value)}><option value="">Todos</option>{operarios.filter(Boolean).map(o=><option key={o} value={o}>{o}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Turno</div><select style={selStyle} value={fTurno} onChange={e=>setFTurno(e.target.value)}><option value="">Todos</option>{turnos.filter(Boolean).map(t=><option key={t} value={t}>{t}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Desde</div><input type="date" style={selStyle} value={fDesde} onChange={e=>setFDesde(e.target.value)}/></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Hasta</div><input type="date" style={selStyle} value={fHasta} onChange={e=>setFHasta(e.target.value)}/></div>
        </div>
      )}

      {/* FICHAS (ya filtradas) */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:20}}>
        <StatCard label="Reportes" value={fr.length} borderColor="#3B82F6" breakdown={bdReportes} trend={`${fr.length} de ${reports.length} totales`}/>
        <ProdCard reports={fr}/>
        <StatCard label="Merma total" value={rmMerma.pct!==null?rmMerma.pct+"%":totalMerma.toLocaleString()} accent="var(--bad)" borderColor="var(--bad)" highlight="bad" breakdown={bdMerma} trend={rmMerma.pct!==null?`${rmMerma.mermaKg.toLocaleString()} kg merma · ${rmMerma.prodKg.toLocaleString()} kg prod.${rmMerma.sinPeso>0?` · ${rmMerma.sinPeso} sin peso`:""}`:"Define pesos para el %"}/>
        <StatCard label="Tiempos muertos" value={tmPct!==null?tmPct+"%":totalTM.toLocaleString()} accent="var(--amber)" borderColor="var(--amber)" highlight="amber" breakdown={bdTM} trend={totalProgMin>0?`Perdido ${totalTM.toLocaleString()} min (${tmPct}%) de ${totalProgMin.toLocaleString()} min prog. · ≈ ${totalTMh}h de ${totalProgH}h`:`${totalTM.toLocaleString()} min · ≈ ${totalTMh}h`}/>
        <StatCard label="% Eficiencia" value={avgEfic} borderColor="var(--brand-blue)" breakdown={bdEfic} trend={totalProgMin>0?`≈ ${totalProdH}h productivas de ${totalProgH}h programadas`:"Hrs productivas ÷ programadas"}/>
      </div>

      {/* GRÁFICAS (ya filtradas) */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <BarChartDash data={prodByDayKg} title="Producción por día · Kg" sub="Eje X: día (DD/MM)" color="var(--good)" labelKey="label" valueKey="val" unidad="kg"/>
        <BarChartDash data={prodByDayUnd} title="Producción por día · Unidades" sub="Eje X: día (DD/MM)" color="var(--brand-blue)" labelKey="label" valueKey="val" unidad="und"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
        <BarChartDash data={mermaPorMaq} title="Merma por máquina" sub="Eje X: máquina" color="var(--bad)" labelKey="label" valueKey="val" unidad="kg/und"/>
        <LineChartDash data={mermaByDayArr} title="Evolución de mermas" sub="Eje X: día (DD/MM)" color="var(--bad)" labelKey="label" valueKey="val" unidad="kg/und"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:22}}>
        <DonutDash data={donutKg} title="Producción por máquina · Kg" unidad="Kg"/>
        <DonutDash data={donutUnd} title="Producción por máquina · Unidades" unidad="und"/>
      </div>

      {/* COMPARATIVO DE PERIODOS */}
      {hayComp && <>
        <div style={{fontSize:13,fontWeight:700,margin:"4px 0 12px"}}>Comparativo · últimos 7 días vs. 7 previos {activeF>0 && <span style={{fontSize:11,fontWeight:500,color:"var(--text-dim)"}}>(respeta máquina/operario/turno)</span>}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:22}}>
          <CompareCard label="Producción (kg)" cur={cmpProdCur} prev={cmpProdPrev} unidad=" kg"/>
          <CompareCard label="Eficiencia" cur={cmpEfCur} prev={cmpEfPrev} unidad="%"/>
          <CompareCard label="Merma %" cur={cmpMeCur} prev={cmpMePrev} unidad="%" invert={true}/>
          <CompareCard label="T. muertos (min)" cur={cmpTmCur} prev={cmpTmPrev} unidad=" min" invert={true}/>
        </div>
      </>}

      {/* TENDENCIA EFICIENCIA + TOP MOTIVOS TIEMPO MUERTO */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:22}}>
        <LineChartDash data={efTrend} title="Tendencia de eficiencia (%)" sub="Eje X: día (DD/MM)" color="var(--brand-blue)" labelKey="label" valueKey="val" unidad="%"/>
        <BarChartDash data={topTM} title="Top motivos de tiempo muerto" sub="Eje X: motivo" color="var(--amber)" labelKey="label" valueKey="val" unidad="min"/>
      </div>

      {/* RESUMEN POR MÁQUINA (ya filtrado) */}
      <div style={{background:"var(--card)",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,marginBottom:24,overflowX:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid var(--line)",fontWeight:600,fontSize:13}}>Resumen por máquina</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>
            {["Máquina","Reportes","Producción","Merma","T. Muertos (min)","Hrs Prog.","Hrs Prod.","% Eficiencia","Meta","vs Meta"].map(h=><th key={h} style={{padding:"9px 14px",color:"var(--th-text)",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {byMaq.filter(x=>x.reportes>0).map(x=>(
              <tr key={x.maquina} style={{borderTop:"1px solid var(--line)"}}>
                <td style={{padding:"9px 14px",fontWeight:700}}><span style={{display:"flex",alignItems:"center",gap:8}}><Semaforo pct={x.rend}/>{x.maquina}</span></td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)"}}>{x.reportes}</td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)",color:"var(--good)",fontWeight:700}}>{x.prod.toLocaleString()}</td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)",color:"var(--bad)",fontWeight:700}}>{x.merma.toLocaleString()}</td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)"}}>{x.tm}</td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)"}}>{x.horasProg}</td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)",color:"var(--good)",fontWeight:600}}>{x.horasProd}</td>
                <td style={{padding:"9px 14px"}}><UtilBar val={x.eficiencia!==null?x.eficiencia+"%":"-"} hi={85} lo={60}/></td>
                <td style={{padding:"9px 14px",fontFamily:"var(--mono)",fontSize:12,color:"var(--text-dim)"}}>{x.metaStr}</td>
                <td style={{padding:"9px 14px"}}><RendBar rend={x.rend}/></td>
              </tr>
            ))}
            {byMaq.every(x=>x.reportes===0) && <tr><td colSpan="10" style={{padding:14,textAlign:"center",color:"var(--text-dim)"}}>Sin reportes para estos filtros.</td></tr>}
          </tbody>
        </table>
      </div>

      {/* HISTORIAL (filtro global + filtro propio) */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setShowHist(!showHist)}>
          <span style={{fontWeight:700,fontSize:14}}>Historial de reportes</span><span style={{fontSize:12,color:"var(--text-dim)"}}>{showHist?"▲":"▼"}</span>
        </div>
        {showHist && (
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>exportReportesXLSX(frHist,"reportes_filtrados.xlsx")} title="Exportar a Excel lo que ves en el historial" style={{background:"var(--good)",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>⬇ Exportar ({frHist.length})</button>
            {activeFH>0 && <button onClick={clearFH} style={{background:"#FEE2E2",color:"var(--bad)",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Limpiar ({activeFH})</button>}
            <button onClick={()=>setShowHistFilter(!showHistFilter)} style={{background:showHistFilter||activeFH>0?"var(--accent)":"var(--panel-2)",color:showHistFilter||activeFH>0?"#fff":"var(--text-dim)",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{showHistFilter?"▲ Ocultar":"▼ Filtrar historial"}{activeFH>0?` (${activeFH})`:""}</button>
          </div>
        )}
      </div>
      {showHist && showHistFilter && (
        <div style={{background:"var(--card)",border:"1px solid var(--line)",borderRadius:12,padding:16,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:12}}>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Máquina</div><select style={selStyle} value={hMaquina} onChange={e=>setHMaquina(e.target.value)}><option value="">Todas</option>{maquinas.filter(Boolean).map(m=><option key={m} value={m}>{m}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Operario</div><select style={selStyle} value={hOperario} onChange={e=>setHOperario(e.target.value)}><option value="">Todos</option>{operarios.filter(Boolean).map(o=><option key={o} value={o}>{o}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Turno</div><select style={selStyle} value={hTurno} onChange={e=>setHTurno(e.target.value)}><option value="">Todos</option>{turnos.filter(Boolean).map(t=><option key={t} value={t}>{t}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Desde</div><input type="date" style={selStyle} value={hDesde} onChange={e=>setHDesde(e.target.value)}/></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Hasta</div><input type="date" style={selStyle} value={hHasta} onChange={e=>setHHasta(e.target.value)}/></div>
        </div>
      )}
      {showHist && (
        <div style={{transform:"rotateX(180deg)",overflowX:"auto",border:"1px solid rgba(0,0,0,0.07)",borderRadius:14,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <table style={{transform:"rotateX(180deg)",width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>
              <ThSort label="Fecha" k="fecha" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="F.Turno" k="fturno" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Nombre" k="nombre" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Máquina" k="maquina" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Turno" k="turno" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Siesa" k="siesa" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Referencia" k="referencia" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Prod." k="prod" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Merma" k="merma" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="T.M." k="tm" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="% Util." k="util" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Rend. Real" k="rend" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="% Rend." k="rendpct" sort={sortH} extra={{position:"static"}}/>
            </tr></thead>
            <tbody>
              {aplicarOrden(frHist, sortH, (r,k)=> k==='fecha'?(getFechaISO(r)||'') : k==='fturno'?(getFechaISO(r)||'') : k==='nombre'?(r.nombre||'') : k==='maquina'?(r.maquina||'') : k==='turno'?(r.turno||'') : k==='siesa'?String(r.siesa||'') : k==='referencia'?(r.referencia||'') : k==='prod'?(Number(r.produccion)||0) : k==='merma'?sumNumeros(r.mermasCantidad) : k==='tm'?sumNumeros(r.tiemposMuertosMinutos) : k==='util'?((calcUtilizacion(r)||{}).utilizacion||0) : k==='rend'?((calcRendimiento(r,metas)||{}).rendReal||0) : k==='rendpct'?((calcRendimiento(r,metas)||{}).pct||0) : '').map(r=>{
                const u=calcUtilizacion(r), rd=calcRendimiento(r,metas);
                return(
                  <tr key={r.id||r.ts+r.consecutivo} style={{borderTop:"1px solid var(--line)"}}>
                    <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontFamily:"var(--mono)",fontSize:12}}>{r.fecha}</td>
                    <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontFamily:"var(--mono)",fontSize:12}}>{fechaLarga(getFechaISO(r))||"-"}</td>
                    <td style={{padding:"8px 10px"}}>{r.nombre}</td>
                    <td style={{padding:"8px 10px"}}>{r.maquina}</td>
                    <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontSize:12}}>{r.turno}</td>
                    <td style={{padding:"8px 10px"}}>{r.siesa}</td>
                    <td style={{padding:"8px 10px",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.referencia}</td>
                    <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.produccion} {r.unidad}</td>
                    <td style={{padding:"8px 10px",color:"var(--bad)",whiteSpace:"nowrap"}}>{fmtMC(r)}</td>
                    <td style={{padding:"8px 10px",color:"var(--amber)",whiteSpace:"nowrap"}}>{fmtTMin(r)}</td>
                    <td style={{padding:"8px 10px"}}><UtilBar val={u?u.utilizacion+"%":"-"} hi={85} lo={60}/></td>
                    <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontSize:12}}>{rd?rd.rendReal.toLocaleString()+" "+rd.unidad:"-"}</td>
                    <td style={{padding:"8px 10px"}}><RendBar rend={rd?rd.pct:null}/></td>
                  </tr>
                );
              })}
              {frHist.length===0 && <tr><td colSpan="13" style={{padding:18,textAlign:"center",color:"var(--text-dim)"}}>Sin reportes para estos filtros.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


/* ================== VISTA POR BODEGA (PT / PP) ==================
   Producto en Proceso incluye la ficha de MERMA %. */
const TIPO_COLORS={"Bolsa de agua":"#3B82F6","Bolsa valvulada":"#16A34A","Bolsa abierta":"#D97706","Flow Pack":"#8B5CF6","Lámina":"#06B6D4","Lámina Termoencogible":"#0EA5E9","Lámina Impresa":"#6366F1","Lámina Doblada":"#14B8A6","Tubular":"#EC4899","Semitubular":"#F97316","Rollo":"#84CC16","Sachet/Doypack":"#DC2626"};

function Top5PorTipo({reports,tipos,getCategoria}){
  const conDatos=tipos.filter(t=>t!=="Todos"&&reports.some(r=>getCategoria(r)===t));
  if(conDatos.length===0) return null;
  return(
    <div style={{gridColumn:"1/-1"}}>
      <div style={{fontSize:12,fontWeight:600,marginBottom:12}}>Top 5 referencias por tipo</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {conDatos.map(t=><Top5Card key={t} title={`Top 5 · ${t}`} reports={reports.filter(r=>getCategoria(r)===t)} color={TIPO_COLORS[t]||"#6B7280"}/>)}
      </div>
    </div>
  );
}

function BodegaView({reports,titulo,showFiltros}){
  const [fTipo,setFTipo]=useState("Todos");
  const [fSector,setFSector]=useState("Todos");
  const [fMaquina,setFMaquina]=useState("Todas");
  const [fOperario,setFOperario]=useState("Todos");
  const [fDesde,setFDesde]=useState("");
  const [fHasta,setFHasta]=useState("");
  const [showFilter,setShowFilter]=useState(false);
  const [showHist,setShowHist]=useState(false);
  const sortH=useSort('fecha','desc');

  const getCategoria=r=>clasificarReporte(r).categoria;
  const getSector=r=>clasificarReporte(r).sector;
  const rb=reports.filter(r=>clasificarReporte(r).bodega===titulo);

  const tipos=["Todos",...new Set(rb.map(getCategoria).filter(x=>x&&x!=="-"))].sort();
  const sectores=["Todos",...new Set(rb.map(getSector).filter(x=>x&&x!=="-"))].sort();
  const mqs=["Todas",...new Set(rb.map(r=>r.maquina).filter(Boolean))].sort();
  const operarios=["Todos",...new Set(rb.map(r=>r.nombre).filter(Boolean))].sort();

  const f=rb.filter(r=>{
    if(fTipo!=="Todos"&&getCategoria(r)!==fTipo)return false;
    if(fSector!=="Todos"&&getSector(r)!==fSector)return false;
    if(fMaquina!=="Todas"&&r.maquina!==fMaquina)return false;
    if(fOperario!=="Todos"&&r.nombre!==fOperario)return false;
    const iso=getFechaISO(r);
    if(fDesde&&iso&&iso<fDesde)return false;
    if(fHasta&&iso&&iso>fHasta)return false;
    return true;
  });

  const pieTipo=tipos.filter(t=>t!=="Todos").map(t=>({label:t,val:rb.filter(r=>getCategoria(r)===t).reduce((s,r)=>s+(Number(r.produccion)||0),0)})).filter(d=>d.val>0);
  const pieSector=showFiltros?sectores.filter(s=>s!=="Todos").map(s=>({label:s,val:rb.filter(r=>getSector(r)===s).reduce((s2,r)=>s2+(Number(r.produccion)||0),0)})).filter(d=>d.val>0):[];

  const activeF=[fTipo,fSector,fMaquina,fOperario,fDesde,fHasta].filter(v=>v&&v!=="Todos"&&v!=="Todas").length;
  const clearF=()=>{setFTipo("Todos");setFSector("Todos");setFMaquina("Todas");setFOperario("Todos");setFDesde("");setFHasta("");};

  // Tarjetas resumen de la bodega (contexto general)
  const ovKg=Math.round(rb.reduce((s,r)=>s+produccionKg(r),0));
  const ovUnd=rb.filter(r=>MAQUINAS_UND.includes(r.maquina)).reduce((s,r)=>s+(Number(r.produccion)||0),0);
  const ovRefs=new Set(rb.map(r=>r.siesa||r.sku).filter(Boolean)).size;
  const ovTipos=new Set(rb.map(getCategoria).filter(c=>c&&c!=="-")).size;

  return(
    <div>
      {/* 1) TARJETAS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:18}}>
        <InvCard label="Reportes" value={rb.length.toLocaleString()} color="var(--accent)"/>
        <InvCard label="Producción (kg)" value={ovKg.toLocaleString()+" kg"} color="var(--good)"/>
        <InvCard label={showFiltros?"Producción (und)":"Referencias"} value={showFiltros?ovUnd.toLocaleString():ovRefs.toLocaleString()} color="var(--brand-blue)"/>
        <InvCard label="Tipos de producto" value={ovTipos.toLocaleString()} color="var(--accent)"/>
      </div>
      {/* 2) GRÁFICOS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
        <PieChart data={pieTipo} title={showFiltros?"Producción por tipo de producto":"Producción por tipo de lámina/proceso"}/>
        {showFiltros && pieSector.length>0 ? <PieChart data={pieSector} title="Producción por sector"/> : <div/>}
      </div>
      <div style={{display:"grid",gap:14,marginBottom:20}}><Top5PorTipo reports={f} tipos={tipos} getCategoria={getCategoria}/></div>

      {/* Filtros */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showFilter?12:16}}>
        <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setShowHist(!showHist)}><span style={{fontSize:14,fontWeight:600}}>Historial</span><span style={{fontSize:12,color:"var(--text-dim)"}}>{showHist?"▲":"▼"}</span></div>
        <div style={{display:"flex",gap:8}}>
          {activeF>0 && <button onClick={clearF} style={{background:"#FEE2E2",color:"var(--bad)",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✕ Limpiar ({activeF})</button>}
          <button onClick={()=>setShowFilter(!showFilter)} style={{background:showFilter||activeF>0?"var(--accent)":"var(--panel-2)",color:showFilter||activeF>0?"#fff":"var(--text-dim)",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{showFilter?"▲ Ocultar":"▼ Filtrar"}{activeF>0?` (${activeF})`:""}</button>
        </div>
      </div>
      {showFilter && (
        <div style={{background:"var(--card)",border:"1px solid var(--line)",borderRadius:12,padding:16,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Tipo</div><select style={{...inputStyle,fontSize:13}} value={fTipo} onChange={e=>setFTipo(e.target.value)}>{tipos.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
          {showFiltros && <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Sector</div><select style={{...inputStyle,fontSize:13}} value={fSector} onChange={e=>setFSector(e.target.value)}>{sectores.map(s=><option key={s} value={s}>{s}</option>)}</select></div>}
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Máquina</div><select style={{...inputStyle,fontSize:13}} value={fMaquina} onChange={e=>setFMaquina(e.target.value)}>{mqs.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Operario</div><select style={{...inputStyle,fontSize:13}} value={fOperario} onChange={e=>setFOperario(e.target.value)}>{operarios.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Desde</div><input type="date" style={{...inputStyle,fontSize:13}} value={fDesde} onChange={e=>setFDesde(e.target.value)}/></div>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Hasta</div><input type="date" style={{...inputStyle,fontSize:13}} value={fHasta} onChange={e=>setFHasta(e.target.value)}/></div>
        </div>
      )}
      {showHist && (
        <div style={{transform:"rotateX(180deg)",overflowX:"auto",border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <table style={{transform:"rotateX(180deg)",width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>
              <ThSort label="Fecha" k="fecha" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Nombre" k="nombre" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Máquina" k="maquina" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Turno" k="turno" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Referencia" k="referencia" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Prod." k="prod" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Tipo" k="tipo" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Sector" k="sector" sort={sortH} extra={{position:"static"}}/>
              <ThSort label="Merma" k="merma" sort={sortH} extra={{position:"static"}}/>
              <th style={{padding:"9px 10px",color:"var(--th-text)",fontWeight:700,whiteSpace:"nowrap"}}>Motivo Merma</th>
              <ThSort label="T.M." k="tm" sort={sortH} extra={{position:"static"}}/>
            </tr></thead>
            <tbody>
              {aplicarOrden(f, sortH, (r,k)=> k==='fecha'?(getFechaISO(r)||'') : k==='nombre'?(r.nombre||'') : k==='maquina'?(r.maquina||'') : k==='turno'?(r.turno||'') : k==='referencia'?(r.referencia||'') : k==='prod'?(Number(r.produccion)||0) : k==='tipo'?(getCategoria(r)||'') : k==='sector'?(getSector(r)||'') : k==='merma'?sumNumeros(r.mermasCantidad) : k==='tm'?sumNumeros(r.tiemposMuertosMinutos) : '').map(r=>{const c=clasificarReporte(r);return(
                <tr key={r.id||r.ts+r.consecutivo} style={{borderTop:"1px solid var(--line)"}}>
                  <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontFamily:"var(--mono)",fontSize:12}}>{r.fecha}</td>
                  <td style={{padding:"8px 10px"}}>{r.nombre}</td>
                  <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.maquina}</td>
                  <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontSize:12}}>{r.turno}</td>
                  <td style={{padding:"8px 10px",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.referencia}</td>
                  <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.produccion} {r.unidad}</td>
                  <td style={{padding:"8px 10px"}}><span style={{background:"var(--badge-bg)",color:"var(--badge-text)",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{c.categoria}</span></td>
                  <td style={{padding:"8px 10px"}}><span style={{background:"var(--panel-2)",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{c.sector||"-"}</span></td>
                  <td style={{padding:"8px 10px",color:"var(--bad)",whiteSpace:"nowrap"}}>{r.mermasCantidad||"-"}</td>
                  <td style={{padding:"8px 10px",color:"var(--bad)"}}>{r.mermasMotivo||"-"}</td>
                  <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.tiemposMuertosMinutos||"-"}</td>
                </tr>
              );})}
              {f.length===0 && <tr><td colSpan="11" style={{padding:18,textAlign:"center",color:"var(--text-dim)"}}>Sin reportes para estos filtros.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


/* ================== EDITOR DE METAS ================== */
function MetasEditor({onClose,onSaved}){
  const [local,setLocal]=useState(JSON.parse(JSON.stringify(loadMetas())));
  const maquinas=Object.keys(DEFAULT_METAS);
  const upd=(m,field,val)=>setLocal(p=>({...p,[m]:{...p[m],[field]:field==='meta'?Number(val):val}}));
  function save(){ saveMetas(local); onSaved&&onSaved(); onClose(); }
  return(
    <Modal title="🎯 Metas de producción por máquina" onClose={onClose}>
      <div style={{marginBottom:12,fontSize:12,color:"var(--text-dim)"}}>Al cambiar una meta, TODO el histórico se recalcula automáticamente. Ideal para plantear mejoras en el tiempo.</div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead><tr style={{background:"var(--panel-2)"}}>
          <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600}}>Máquina</th>
          <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600}}>Meta</th>
          <th style={{padding:"8px 12px",textAlign:"left",fontWeight:600}}>Unidad</th>
        </tr></thead>
        <tbody>
          {maquinas.map(m=>(
            <tr key={m} style={{borderTop:"1px solid var(--line)"}}>
              <td style={{padding:"10px 12px",fontWeight:500}}>{m}</td>
              <td style={{padding:"6px 12px"}}><input type="number" value={local[m]?.meta||0} onChange={e=>upd(m,'meta',e.target.value)} style={{...inputStyle,width:110,padding:"6px 10px"}}/></td>
              <td style={{padding:"6px 12px",color:"var(--text-dim)",fontSize:12}}>{local[m]?.unidad}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{display:"flex",justifyContent:"flex-end",gap:10,marginTop:18}}>
        <button onClick={onClose} style={{background:"var(--panel-2)",border:"1px solid var(--line)",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:13}}>Cancelar</button>
        <button onClick={save} style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:600}}>Guardar metas</button>
      </div>
    </Modal>
  );
}

/* ================== EDITOR DE CATÁLOGO / MÁQUINAS ==================
   El modal de SKU ahora captura TODOS los campos, incluida la clasificación. */
const CATEGORIAS=["Bolsa abierta","Bolsa valvulada","Bolsa de agua","Flow Pack","Lámina","Lámina Termoencogible","Tubular","Semitubular","Rollo","Sachet/Doypack"];
const SECTORES=["Construcción","Agua potable","Alimentos","Industrial","Mascotas"];
const BODEGAS=["Producto Terminado","Producto en Proceso"];

function CatalogEditor({catalog,setCatalog,machines,setMachines,onEditMetas}){
  const [showSKU,setShowSKU]=useState(false);
  const [showMachines,setShowMachines]=useState(false);
  const [showPesos,setShowPesos]=useState(false);
  const [pesos,setPesos]=useState(loadPesos());
  const [buscar,setBuscar]=useState("");
  const [f,setF]=useState({siesa:"",sku:"",referencia:"",bodega:"Producto Terminado",categoria:"Bolsa abierta",sector:"Construcción",peso:""});
  const [newMachine,setNewMachine]=useState("");
  const [msg,setMsg]=useState("");

  function setPeso(siesa,val){
    const pz={...loadPesos()};
    if(val===""||isNaN(Number(val))) delete pz[siesa]; else pz[siesa]=Number(val);
    savePesos(pz); setPesos(pz);
  }
  const nPesos=Object.keys(pesos).length;
  const resultados = buscar.trim().length>=2
    ? catalog.filter(c=>(c.referencia+" "+c.siesa).toLowerCase().includes(buscar.trim().toLowerCase())).slice(0,60)
    : [];

  function addCode(e){
    e.preventDefault();
    if(!f.siesa||!f.sku||!f.referencia){ setMsg("Siesa, SKU y Referencia son obligatorios."); return; }
    const esProceso = f.bodega==="Producto en Proceso";
    const nuevo={siesa:f.siesa.trim(),sku:f.sku.trim(),referencia:f.referencia.trim()};
    const list=[...catalog.filter(c=>c.siesa!==nuevo.siesa),nuevo];
    setCatalog(list); saveCatalog(list);
    // Guardar clasificación del nuevo SKU
    const extra=(()=>{try{return JSON.parse(localStorage.getItem('clasificacion-siesa')||"{}");}catch(e){return {};}})();
    extra[nuevo.siesa]={bodega:f.bodega,categoria:f.categoria,sector:esProceso?null:f.sector};
    saveClasificacionExtra(extra);
    if(f.peso!==""&&!isNaN(Number(f.peso))){ const pz={...loadPesos()}; pz[nuevo.siesa]=Number(f.peso); savePesos(pz); setPesos(pz); }
    setF({siesa:"",sku:"",referencia:"",bodega:"Producto Terminado",categoria:"Bolsa abierta",sector:"Construcción",peso:""});
    setMsg("✓ Producto agregado con su clasificación.");
  }
  function removeCode(s){ const list=catalog.filter(c=>c.siesa!==s); setCatalog(list); saveCatalog(list); }
  function addMachine(e){ e.preventDefault(); if(!newMachine||machines.includes(newMachine))return; const u=[...machines,newMachine]; setMachines(u); saveMachines(u); setNewMachine(""); }
  function removeMachine(m){ const u=machines.filter(x=>x!==m); setMachines(u); saveMachines(u); }

  const esProceso=f.bodega==="Producto en Proceso";
  const autoPeso=pesoPorTipoDe(f.categoria,f.sector,f.referencia); // peso sugerido por tipo
  const cardBtn={background:"var(--card)",border:"1px solid rgba(0,0,0,0.08)",borderRadius:12,padding:"14px 22px",fontWeight:600,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:10,boxShadow:"0 1px 3px rgba(0,0,0,0.05)"};

  return(
    <div style={{display:"flex",gap:14,marginBottom:30,flexWrap:"wrap"}}>
      <button onClick={()=>setShowSKU(true)} style={cardBtn}><span style={{fontSize:20}}>🏷️</span><div style={{textAlign:"left"}}><div>Códigos SKU / Siesa</div><div style={{fontWeight:400,fontSize:12,color:"var(--text-dim)",marginTop:2}}>{catalog.length} referencias</div></div></button>
      <button onClick={()=>setShowMachines(true)} style={cardBtn}><span style={{fontSize:20}}>⚙️</span><div style={{textAlign:"left"}}><div>Máquinas</div><div style={{fontWeight:400,fontSize:12,color:"var(--text-dim)",marginTop:2}}>{machines.length} registradas</div></div></button>
      {onEditMetas && <button onClick={onEditMetas} style={cardBtn}><span style={{fontSize:20}}>🎯</span><div style={{textAlign:"left"}}><div>Metas</div><div style={{fontWeight:400,fontSize:12,color:"var(--text-dim)",marginTop:2}}>Editar metas por máquina</div></div></button>}
      <button onClick={()=>setShowPesos(true)} style={cardBtn}><span style={{fontSize:20}}>⚖️</span><div style={{textAlign:"left"}}><div>Pesos de productos</div><div style={{fontWeight:400,fontSize:12,color:"var(--text-dim)",marginTop:2}}>{nPesos} con peso definido</div></div></button>

      {showPesos && (
        <Modal title="⚖️ Pesos por unidad (para calcular Merma %)" onClose={()=>setShowPesos(false)}>
          <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:12}}>Define el peso en kg de cada unidad producida (bolsas). Sirve para convertir la producción por unidades a kg y así calcular la <b>Merma %</b>. Busca por nombre o código Siesa.</div>
          <input style={{...inputStyle,marginBottom:12}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar producto (mín. 2 letras)…" autoFocus/>
          {buscar.trim().length<2 && <div style={{fontSize:13,color:"var(--text-dim)",padding:"10px 0"}}>Escribe al menos 2 letras para buscar. Actualmente hay <b>{nPesos}</b> productos con peso definido.</div>}
          {resultados.map(c=>{
            const auto=pesoPorTipo({siesa:c.siesa,sku:c.sku,referencia:c.referencia});
            const manual=pesos[c.siesa]!==undefined;
            return (
            <div key={c.siesa} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid var(--line)"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.referencia}</div>
                <div style={{fontSize:11,color:"var(--text-dim)",fontFamily:"var(--mono)"}}>{c.siesa} · {manual?<span style={{color:"var(--accent)"}}>manual</span>:(auto>0?`auto ${auto} kg`:"sin peso")}</div>
              </div>
              <input style={{...inputStyle,width:130,padding:"7px 10px"}} type="number" step="any" defaultValue={manual?pesos[c.siesa]:""} onBlur={e=>setPeso(c.siesa,e.target.value)} placeholder={auto>0?`auto ${auto}`:"kg/unidad"}/>
            </div>
            );
          })}
          {buscar.trim().length>=2 && resultados.length===0 && <div style={{fontSize:13,color:"var(--text-dim)",padding:"10px 0"}}>Sin resultados para "{buscar}".</div>}
        </Modal>
      )}

      {showSKU && (
        <Modal title="Agregar producto (todos los campos)" onClose={()=>{setShowSKU(false);setMsg("");}}>
          <form onSubmit={addCode} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>

            <div style={{gridColumn:"1/-1",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
              <span style={{fontSize:12,color:msg.startsWith("✓")?"var(--good)":"var(--bad)"}}>{msg}</span>
              <button type="submit" style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontWeight:700,cursor:"pointer"}}>+ Agregar producto</button>
            </div>
          </form>
          <div style={{marginTop:14,borderTop:"1px solid var(--line)",paddingTop:12}}>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:8}}>Catálogo actual ({catalog.length})</div>
            {catalog.slice(0,60).map(c=>(
              <div key={c.siesa} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--line)",fontSize:13}}>
                <span><b>{c.siesa}</b> · {c.referencia}</span>
                <button onClick={()=>removeCode(c.siesa)} style={{background:"none",border:"none",color:"var(--bad)",cursor:"pointer",fontSize:13}}>quitar</button>

            ))}
            {catalog.length>60 && <div style={{fontSize:12,color:"var(--text-dim)",marginTop:8}}>… y {catalog.length-60} más.</div>}

      {showMachines && (
        <Modal title="Máquinas" onClose={()=>setShowMachines(false)}>
          <form onSubmit={addMachine} style={{display:"flex",gap:8,marginBottom:14}}>
            <input style={inputStyle} placeholder="Nombre de la máquina" value={newMachine} onChange={e=>setNewMachine(e.target.value)}/>
            <button type="submit" style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:8,padding:"0 16px",fontWeight:700,cursor:"pointer"}}>+</button>

              <span>{m}</span><button onClick={()=>removeMachine(m)} style={{background:"none",border:"none",color:"var(--bad)",cursor:"pointer",fontSize:13}}>quitar</button>

          ))}
        </Modal>
      )}
    </div>
  );
}

function TrazabilidadModal({siesa, reports, onClose}){
  const rows=reports.filter(r=>(r.siesa===siesa||r.sku===siesa)).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const ref=rows.length?rows[0].referencia:siesa;
  const cls=rows.length?clasificarReporte(rows[0]):{};
  const p=loadPesos();
  const totalUnd=rows.reduce((s,r)=>{const u=String(r.unidad||"").toLowerCase();return s+(u.indexOf("kg")===0?0:(Number(r.produccion)||0));},0);
  // Peso separado por bodega: NO mezclar producto terminado con producto en proceso.
  const kgPT=rows.filter(r=>clasificarReporte(r).bodega==="Producto Terminado").reduce((s,r)=>s+produccionKg(r,p),0);
  const kgPP=rows.filter(r=>clasificarReporte(r).bodega==="Producto en Proceso").reduce((s,r)=>s+produccionKg(r,p),0);
  const totalMerma=rows.reduce((s,r)=>s+sumNumeros(r.mermasCantidad),0);
  const fechasISO=rows.map(getFechaISO).filter(Boolean).sort();
  const rango=fechasISO.length?`${fechaLarga(fechasISO[0])} → ${fechaLarga(fechasISO[fechasISO.length-1])}`:"-";

    <div style={{background:"var(--panel-2)",borderRadius:10,padding:"10px 14px",flex:"1 1 120px"}}>
      <div style={{fontSize:10,color:"var(--text-dim)",textTransform:"uppercase",fontWeight:600,letterSpacing:"0.05em"}}>{label}</div>
      <div style={{fontSize:16,fontWeight:700,fontFamily:"var(--mono)",color:color||"var(--text)"}}>{val}</div>
    </div>
  );
  return (
    <Modal title={`🔎 Trazabilidad · ${ref}`} onClose={onClose}>
      <div style={{display:"flex",gap:10,marginBottom:8,fontSize:12,color:"var(--text-dim)",flexWrap:"wrap"}}>
        <span><b style={{color:"var(--text)"}}>Código:</b> {siesa}</span>
        <span><b style={{color:"var(--text)"}}>Tipo:</b> {cls.categoria||"-"}</span>
        <span><b style={{color:"var(--text)"}}>Sector:</b> {cls.sector||"-"}</span>
        <span><b style={{color:"var(--text)"}}>Peso/und:</b> {pesoUnidad(rows[0]||{siesa})||"-"} kg</span>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        {mini("Reportes",rows.length,"var(--accent)")}
        {mini("Unidades",Math.round(totalUnd).toLocaleString(),"var(--good)")}
        {mini("Peso · Terminado",Math.round(kgPT).toLocaleString()+" kg","var(--good)")}
        {mini("Peso · En proceso",Math.round(kgPP).toLocaleString()+" kg","var(--brand-blue)")}
        {mini("Merma",totalMerma.toLocaleString(),"var(--bad)")}
        {mini("Periodo",rango)}
      </div>
      <div style={{overflowX:"auto",border:"1px solid var(--line)",borderRadius:10}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"var(--panel-2)",textAlign:"left"}}>
            {["Fecha turno","Turno","Máquina","Operario","Producción","Peso (kg)","Merma","Rollos (madre → prod.)","Consecutivo"].map(h=><th key={h} style={{padding:"8px 9px",color:"var(--th-text)",fontWeight:700,whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
