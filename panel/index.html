function InventarioRollos({reports}){
  const [fMaq,setFMaq]=useState(""); const [fTipo,setFTipo]=useState("");
  const [fMedida,setFMedida]=useState(""); const [fColor,setFColor]=useState("");
  const [buscar,setBuscar]=useState("");
  const sort=useSort('peso','desc');
  const selStyle={...inputStyle,fontSize:12,padding:"7px 10px"};
  const tipoColor=t=>TIPO_COLORS[t]||"#64748B";

  // Solo reportes cuya bodega es "Producto en Proceso" (excluye la excepción Termo→PT).
  const base=reports.filter(r=>clasificarReporte(r).bodega==="Producto en Proceso");
  const all=inventarioProceso(base);

  // Opciones de filtro derivadas de los datos.
  const maquinas=[...new Set(all.map(r=>r.maquina).filter(Boolean))].sort();
  const tipos=[...new Set(all.map(r=>r.tipo).filter(Boolean))].sort();
  const medidas=[...new Set(all.map(r=>String(r.medida)).filter(m=>m&&m!=="-"))].sort((a,b)=>(parseFloat(a)||0)-(parseFloat(b)||0));
  const colores=[...new Set(all.map(r=>r.color).filter(Boolean))].sort();

  let rollos=all;
  if(fMaq)    rollos=rollos.filter(r=>r.maquina===fMaq);
  if(fTipo)   rollos=rollos.filter(r=>r.tipo===fTipo);
  if(fMedida) rollos=rollos.filter(r=>String(r.medida)===fMedida);
  if(fColor)  rollos=rollos.filter(r=>r.color===fColor);
  if(buscar.trim()){
    const q=buscar.trim().toLowerCase();
    rollos=rollos.filter(r=>String(r.numero).toLowerCase().includes(q)||String(r.codigo).toLowerCase().includes(q)||String(r.referencia||"").toLowerCase().includes(q));
  }
  const getVR=(r,k)=> k==='numero'?(r.numero||'') : k==='tipo'?(r.tipo||'') : k==='color'?(r.color||'') : k==='maquina'?(r.maquina||'') : k==='medida'?(parseFloat(r.medida)||0) : k==='calibre'?String(r.calibre||'') : k==='peso'?(Number(r.peso)||0) : k==='codigo'?String(r.codigo||'') : k==='referencia'?(r.referencia||'') : k==='fecha'?(getFechaISO(r)||'') : k==='turno'?(r.turno||'') : k==='operario'?(r.operario||'') : '';
  rollos=aplicarOrden(rollos, sort, getVR);
  const totalKg=rollos.reduce((s,r)=>s+(Number(r.peso)||0),0);
  const hayFiltro=fMaq||fTipo||fMedida||fColor||buscar.trim();

  // Conteo por tipo (sobre el resultado filtrado) para las "chips".
  const porTipo={}; rollos.forEach(r=>{const t=r.tipo;if(!porTipo[t])porTipo[t]={n:0,kg:0};porTipo[t].n++;porTipo[t].kg+=Number(r.peso)||0;});
  const chips=Object.entries(porTipo).sort((a,b)=>b[1].kg-a[1].kg);
  // Datos de gráficos (sobre lo filtrado)
  const pieTipo=chips.map(([t,d])=>({label:t,val:Math.round(d.kg)})).filter(d=>d.val>0);
  const kgPorMaq={}; rollos.forEach(r=>{const m=r.maquina||"—"; kgPorMaq[m]=(kgPorMaq[m]||0)+(Number(r.peso)||0);});
  const barMaq=Object.entries(kgPorMaq).map(([label,val])=>({label,val:Math.round(val)})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);

  return (
    <div style={{marginBottom:26}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4,fontFamily:"var(--head)"}}>📦 Inventario de producto en proceso <span style={{fontSize:12,fontWeight:500,color:"var(--text-dim)"}}>(según reportes)</span></div>
      <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:14}}>Rollos de extrusión, <b>lámina impresa</b> (impresión) y refilado (<b>lámina</b> / <b>lámina doblada</b>). El <b>stock real</b> se ajustará con el inventario base (que nos pasarás) y los consumos (Fase 3).</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:14}}>
        <InvCard label="Registros" value={rollos.length.toLocaleString()} color="var(--accent)"/>
        <InvCard label="Peso total" value={Math.round(totalKg).toLocaleString()+" kg"} color="var(--good)"/>
        <InvCard label="Tipos distintos" value={new Set(rollos.map(r=>r.tipo)).size} color="var(--amber)"/>
      </div>
      {chips.length>0 && <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        {chips.map(([t,d])=>(
          <span key={t} style={{fontSize:11.5,fontWeight:600,padding:"4px 10px",borderRadius:20,color:"#fff",background:tipoColor(t)}}>{t}: {d.n.toLocaleString()} reg{d.kg>0?` · ${Math.round(d.kg).toLocaleString()} kg`:""}</span>
        ))}
      </div>}
      {/* GRÁFICOS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
        <DonutDash data={pieTipo} title="Peso por tipo (kg)" unidad="kg"/>
        <BarChartDash data={barMaq} title="Peso por máquina" sub="Eje X: máquina" color="var(--good)" labelKey="label" valueKey="val" unidad="kg"/>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <select style={{...selStyle,maxWidth:190}} value={fMaq} onChange={e=>setFMaq(e.target.value)}><option value="">Todas las máquinas</option>{maquinas.map(m=><option key={m} value={m}>{m}</option>)}</select>
        <select style={{...selStyle,maxWidth:190}} value={fTipo} onChange={e=>setFTipo(e.target.value)}><option value="">Todos los tipos</option>{tipos.map(t=><option key={t} value={t}>{t}</option>)}</select>
        <select style={{...selStyle,maxWidth:150}} value={fMedida} onChange={e=>setFMedida(e.target.value)}><option value="">Toda medida</option>{medidas.map(m=><option key={m} value={m}>{m} cm</option>)}</select>
        <select style={{...selStyle,maxWidth:150}} value={fColor} onChange={e=>setFColor(e.target.value)}><option value="">Todo color</option>{colores.map(c=><option key={c} value={c}>{c}</option>)}</select>
        <input style={{...selStyle,maxWidth:230}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar # rollo o código SISA…"/>
        {hayFiltro && <button onClick={()=>{setFMaq("");setFTipo("");setFMedida("");setFColor("");setBuscar("");}} style={{...selStyle,cursor:"pointer",background:"var(--panel-2)",maxWidth:110}}>✕ Limpiar</button>}
      </div>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:440,border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>
            <ThSort label="# Rollo" k="numero" sort={sort}/>
            <ThSort label="Tipo" k="tipo" sort={sort}/>
            <ThSort label="Color" k="color" sort={sort}/>
            <ThSort label="Máquina" k="maquina" sort={sort}/>
            <ThSort label="Medida (cm)" k="medida" sort={sort}/>
            <ThSort label="Calibre" k="calibre" sort={sort}/>
            <ThSort label="Peso (kg)" k="peso" sort={sort}/>
            <ThSort label="Código SISA" k="codigo" sort={sort}/>
            <ThSort label="Referencia" k="referencia" sort={sort}/>
            <ThSort label="Fecha turno" k="fecha" sort={sort}/>
            <ThSort label="Turno" k="turno" sort={sort}/>
            <ThSort label="Operario" k="operario" sort={sort}/>
          </tr></thead>
          <tbody>
            {rollos.slice(0,500).map((r,i)=>(
              <tr key={i} style={{borderTop:"1px solid var(--line)"}}>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontWeight:600}}>{r.numero||"-"}</td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}><span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,color:"#fff",background:tipoColor(r.tipo)}}>{r.tipo}</span></td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.color||"-"}</td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>{r.maquina}</td>
                <td style={{padding:"8px 10px"}}>{r.medida||"-"}</td>
                <td style={{padding:"8px 10px"}}>{r.calibre||"-"}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)"}}>{r.peso||"-"}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontSize:12,whiteSpace:"nowrap"}}>{r.codigo||"-"}</td>
                <td style={{padding:"8px 10px",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.referencia||"-"}</td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontFamily:"var(--mono)",fontSize:12}}>{fechaLarga(getFechaISO(r))||"-"}</td>
                <td style={{padding:"8px 10px",whiteSpace:"nowrap",fontSize:12}}>{r.turno||"-"}</td>
                <td style={{padding:"8px 10px"}}>{r.operario||"-"}</td>
              </tr>
            ))}
            {rollos.length===0 && <tr><td colSpan="12" style={{padding:18,textAlign:"center",color:"var(--text-dim)"}}>Sin registros de producto en proceso.</td></tr>}
          </tbody>
        </table>
      </div>
      {rollos.length>500 && <div style={{fontSize:12,color:"var(--text-dim)",marginTop:8}}>Mostrando 500 de {rollos.length.toLocaleString()}. Usa los filtros para acotar.</div>}
    </div>
  );
}

/* ===== INVENTARIO FÍSICO (corte inicial cargado desde bodega) ===== */
function InventarioFisico({bodega,reports}){
  const [buscar,setBuscar]=useState("");
  const [ok,setOk]=useState(()=>{ try{ return new Set(loadVerificadoSiesa()); }catch(e){ return new Set(); } });
  const [soloPend,setSoloPend]=useState(true); // vista limpia: solo referencias pendientes de ingreso a SIESA
  function toggleOk(siesa){ const n=new Set(ok); if(n.has(siesa)) n.delete(siesa); else n.add(siesa); setOk(n); saveVerificadoSiesa([...n]); }
  const B = window.INVENTARIO_BASE || {};
  const fecha = B.fechaCorte ? fechaLarga(B.fechaCorte) : "-";
  const selStyle={...inputStyle,fontSize:12,padding:"7px 10px"};
  const q = buscar.trim().toLowerCase();
  const th = h => <th key={h} style={{padding:"9px 10px",color:"var(--th-text)",fontWeight:700,whiteSpace:"nowrap",position:"sticky",top:0,background:"var(--panel-2)"}}>{h}</th>;

  if(bodega==='pt'){
    const P=loadPesos();
    const CLS=loadClasificacion();
    const totalPt=(B.pt||[]).length;
    const okCount=(B.pt||[]).filter(x=>ok.has(x.siesa)).length;
    const pendCount=totalPt-okCount;
    // Productos manejados en KG (lámina, rollo, termoencogible): su existencia YA está en kilos.
    const invAll=(B.pt||[]).map(x=>{
      const c=CLS[x.siesa]||{};
      const enKg=/l[aá]mina|rollo|termo/i.test(c.categoria||'');
      const pu=pesoUnidad({siesa:x.siesa,sku:x.siesa,referencia:x.referencia},P)||0;
      const kg=enKg?Math.round(x.und||0):Math.round((x.und||0)*pu);
      return {siesa:x.siesa,referencia:x.referencia,und:x.und||0,kg:kg,enKg:enKg};
    });
    // Totales sobre TODO el corte (contexto estable, no cambian al filtrar)
    const tU=invAll.reduce((s,x)=>s+(x.enKg?0:(x.und||0)),0), tK=invAll.reduce((s,x)=>s+(x.kg||0),0);
    // Vista limpia: por defecto solo las referencias PENDIENTES de ingreso a SIESA
    let inv = soloPend ? invAll.filter(x=>!ok.has(x.siesa)) : invAll;
    if(q) inv=inv.filter(x=>((x.referencia||'')+' '+(x.siesa||'')).toLowerCase().includes(q));

    // Si todo está cargado y estamos en modo "solo pendientes": vista colapsada y limpia
    if(soloPend && pendCount===0){
      return (
        <div style={{marginBottom:20}}>

        <div style={{fontSize:15,fontWeight:700,marginBottom:4,fontFamily:"var(--head)"}}>📸 Ingresos a SIESA · Producto Terminado <span style={{fontSize:12,fontWeight:500,color:"var(--text-dim)"}}>(corte {fecha})</span></div>
        <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:14}}>{soloPend?<span>Solo se muestran las referencias <b>pendientes de ingreso a SIESA</b>; las ya cargadas se ocultan para mantener la vista limpia.</span>:<span>Mostrando <b>todas</b> las referencias del corte (unidades × peso por referencia; láminas/rollos/termoencogibles ya en kg).</span>} Marca <b>✓ En SIESA</b> al confirmar la carga (se guarda para todo el equipo).</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:14}}>
          <InvCard label="Referencias (corte)" value={totalPt.toLocaleString()} color="var(--accent)"/>
          <InvCard label="Existencia real" value={Math.round(tU).toLocaleString()+" und"} color="var(--good)"/>
          <InvCard label="Peso aprox." value={"≈ "+Math.round(tK).toLocaleString()+" kg"} color="var(--good)"/>
          <InvCard label="Pendientes por ingresar" value={pendCount.toLocaleString()} color={pendCount===0?"var(--good)":"var(--amber)"} sub={pendCount===0?"¡Todo en SIESA!":okCount+" / "+totalPt+" cargados"}/>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
          <input style={{...selStyle,maxWidth:320}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar referencia o código…"/>
          <button onClick={()=>setSoloPend(!soloPend)} style={{background:"var(--panel-2)",color:"var(--text-dim)",border:"1px solid var(--line)",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{soloPend?`Ver todas (${totalPt})`:`Ver solo pendientes (${pendCount})`}</button>

        <div style={{overflowX:"auto",overflowY:"auto",maxHeight:460,border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
            <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>{["En SIESA","Código SISA","Referencia","Existencia real (und)","≈ Peso (kg)"].map(th)}</tr></thead>
            <tbody>
              {inv.map((x,i)=>(
                <tr key={i} style={{borderTop:"1px solid var(--line)",background:ok.has(x.siesa)?"rgba(22,163,74,0.06)":"transparent"}}>
                  <td style={{padding:"8px 10px",textAlign:"center"}}><input type="checkbox" checked={ok.has(x.siesa)} onChange={()=>toggleOk(x.siesa)} style={{width:16,height:16,cursor:"pointer",accentColor:"var(--good)"}}/></td>
                  <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontSize:12}}>{x.siesa}</td>
                  <td style={{padding:"8px 10px",maxWidth:300,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.referencia}</td>

            </tbody>
          </table>
        </div>
      </div>
    );
  }

  // Producto en Proceso: rollos de extrusión + láminas impresas
  const rollos=(B.ppRollos||[]).filter(x=>!q||((x.desc||'')+' '+(x.siesa||'')).toLowerCase().includes(q));
  const impresas=(B.ppImpresas||[]).filter(x=>!q||((x.referencia||'')+' '+(x.siesa||'')).toLowerCase().includes(q));
  const kR=(B.ppRollos||[]).reduce((s,x)=>s+(x.kg||0),0), kI=(B.ppImpresas||[]).reduce((s,x)=>s+(x.kg||0),0);
  return (
    <div style={{marginBottom:26}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4,fontFamily:"var(--head)"}}>📸 Inventario físico · Producto en Proceso <span style={{fontSize:12,fontWeight:500,color:"var(--text-dim)"}}>(corte {fecha})</span></div>

        <InvCard label="Láminas impresas" value={(B.ppImpresas||[]).length+" ítems"} color="var(--brand-blue)" sub={Math.round(kI).toLocaleString()+" kg"}/>

          <div style={{fontSize:12.5,fontWeight:700,marginBottom:8}}>Rollos de extrusión ({rollos.length})</div>
          <div style={{overflowX:"auto",overflowY:"auto",maxHeight:400,border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>

              <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>{["Código","Descripción","Peso (kg)"].map(th)}</tr></thead>
              <tbody>{rollos.map((x,i)=>(<tr key={i} style={{borderTop:"1px solid var(--line)"}}>
                <td style={{padding:"7px 9px",fontFamily:"var(--mono)",fontSize:11.5}}>{x.siesa}</td>
                <td style={{padding:"7px 9px"}}>{x.desc}</td>

            </table>
          </div>
        </div>
        <div>
          <div style={{fontSize:12.5,fontWeight:700,marginBottom:8}}>Láminas impresas ({impresas.length})</div>
          <div style={{overflowX:"auto",overflowY:"auto",maxHeight:400,border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>{["Código","Referencia","Peso (kg)"].map(th)}</tr></thead>
              <tbody>{impresas.map((x,i)=>(<tr key={i} style={{borderTop:"1px solid var(--line)"}}>
                <td style={{padding:"7px 9px",fontFamily:"var(--mono)",fontSize:11.5}}>{x.siesa}</td>
                <td style={{padding:"7px 9px",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.referencia}</td>
                <td style={{padding:"7px 9px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--good)"}}>{(x.kg||0).toLocaleString()}</td>

          </div>
        </div>
      </div>

  );
}

function InventarioPT({reports}){
  const [buscar,setBuscar]=useState("");
  const [traza,setTraza]=useState(null);
  const list=reports.filter(r=>clasificarReporte(r).bodega==="Producto Terminado");
  let inv=inventarioPT(list);
  if(buscar.trim()) inv=inv.filter(x=>((x.referencia||"")+" "+(x.siesa||"")).toLowerCase().includes(buscar.trim().toLowerCase()));
  const totalUnd=inv.reduce((s,x)=>s+x.unidades,0);
  const totalKg=inv.reduce((s,x)=>s+x.kg,0);
  const sinPesoN=inv.filter(x=>x.sinPeso).length;
  const selStyle={...inputStyle,fontSize:12,padding:"7px 10px"};
  return (
    <div style={{marginBottom:26}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4,fontFamily:"var(--head)"}}>📦 Inventario de producto terminado <span style={{fontSize:12,fontWeight:500,color:"var(--text-dim)"}}>(producido según reportes)</span></div>
      <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:14}}>Cantidades y su <b>peso en kg</b> según la referencia. El <b>stock real</b> se ajustará con los consumos por pedido/remisión (Fase 3).</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:16}}>
        <InvCard label="Referencias" value={inv.length.toLocaleString()} color="var(--accent)"/>
        <InvCard label="Unidades" value={Math.round(totalUnd).toLocaleString()} color="var(--good)"/>
        <InvCard label="Peso total" value={Math.round(totalKg).toLocaleString()+" kg"} color="var(--good)"/>
      </div>
      <input style={{...selStyle,maxWidth:320,marginBottom:6}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar referencia o código…"/>
      <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:12}}>💡 Haz clic en una fila para ver la <b>trazabilidad</b>. El <b>#</b> es el ranking de rotación (más producido primero).{sinPesoN>0 && <span> · <span style={{color:"var(--amber)"}}>⚠️ {sinPesoN} referencia(s) por unidades sin peso definido</span> (no suman a kg).</span>}</div>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:480,border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>
            {["#","Código","Referencia","Categoría","Sector","Cantidad (und)","Peso (kg)","Últ. producción",""].map(h=><th key={h} style={{padding:"9px 10px",color:"var(--th-text)",fontWeight:700,whiteSpace:"nowrap",position:"sticky",top:0,background:"var(--panel-2)"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {inv.slice(0,500).map((x,i)=>{
              const dd=diasDesde(x.ultima);
              const ddCol=dd==null?"var(--text-dim)":dd>60?"var(--bad)":dd>30?"var(--amber)":"var(--text-dim)";
              const ddTxt=x.ultima?(dd===0?"hoy":dd===1?"ayer":"hace "+dd+"d"):"-";
              return (
              <tr key={i} onClick={()=>setTraza(x.siesa)} style={{borderTop:"1px solid var(--line)",cursor:"pointer"}}>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontSize:12,color:"var(--text-dim)"}}>{i+1}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontSize:12}}>{x.siesa}</td>
                <td style={{padding:"8px 10px",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.referencia}</td>
                <td style={{padding:"8px 10px"}}><span style={{background:"var(--badge-bg)",color:"var(--badge-text)",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{x.categoria}</span></td>
                <td style={{padding:"8px 10px",fontSize:12,color:"var(--text-dim)"}}>{x.sector||"-"}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontWeight:600}}>{Math.round(x.unidades).toLocaleString()} {x.sinPeso && <span title="Sin peso definido: no suma a kg" style={{color:"var(--amber)"}}>⚠️</span>}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontWeight:600,color:"var(--good)"}}>{Math.round(x.kg).toLocaleString()}</td>
                <td style={{padding:"8px 10px",fontSize:12,fontFamily:"var(--mono)",color:ddCol,whiteSpace:"nowrap"}}>{ddTxt}</td>
                <td style={{padding:"8px 10px",color:"var(--accent)",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>🔎 ver</td>
              </tr>
            );})}
            {inv.length===0 && <tr><td colSpan="9" style={{padding:18,textAlign:"center",color:"var(--text-dim)"}}>Sin producto terminado registrado aún.</td></tr>}
          </tbody>
        </table>
      </div>
      {inv.length>500 && <div style={{fontSize:12,color:"var(--text-dim)",marginTop:8}}>Mostrando 500 de {inv.length.toLocaleString()}. Usa el buscador para acotar.</div>}
      {traza && <TrazabilidadModal siesa={traza} reports={reports} onClose={()=>setTraza(null)}/>}
    </div>
  );
}

/* ===== DETALLE DE REPORTE (info completa para ingresar a SIESA) ===== */

    <div style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"1px solid var(--line)",alignItems:"flex-start"}}>
      <span style={{minWidth:160,fontSize:11.5,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",flexShrink:0}}>{label}</span>
      <span style={{fontSize:13,fontFamily:mono?"var(--mono)":"inherit",wordBreak:"break-word"}}>{val}</span>
    </div>:null
  );
  const pesos=loadPesos();
  const prodKg=produccionKg(r);
  const mKg=mermaKg(r);
  const pu=pesoUnidad(r,pesos);
  return(
    <Modal title={"📋 "+String(r.siesa||'')+" · "+(r.referencia||'').slice(0,40)} onClose={onClose}>
      <div style={{fontSize:11.5,color:"var(--text-dim)",marginBottom:14,padding:"8px 12px",background:"rgba(234,179,8,0.08)",borderRadius:8,border:"1px solid rgba(234,179,8,0.2)"}}>
        ⏳ Pendiente de ingreso a SIESA. Usa esta información para cargarlo y luego márcalo con ✓.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
        {[
          {label:"Producción",val:(r.produccion||0).toLocaleString()+" "+(r.unidad||""),color:"var(--good)"},
          {label:String(r.unidad||'').toLowerCase().indexOf('kg')===0?"Producción (kg)":"Peso estimado",val:String(r.unidad||'').toLowerCase().indexOf('kg')===0?Math.round(r.produccion||0).toLocaleString()+" kg":(prodKg>0?"≈ "+Math.round(prodKg).toLocaleString()+" kg":"-"),color:"var(--good)"},
          {label:"Merma",val:mKg>0?"≈ "+Math.round(mKg).toLocaleString()+" kg":(r.mermasCantidad||"-"),color:"var(--bad)"},
        ].map(x=>(
          <div key={x.label} style={{background:"var(--panel-2)",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
            <div style={{fontSize:10.5,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:4}}>{x.label}</div>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"var(--mono)",color:x.color}}>{x.val}</div>
          </div>
        ))}
      </div>
      <div style={{overflowY:"auto",maxHeight:"55vh"}}>
        {fila("Código SIESA",r.siesa,true)}
        {fila("Referencia",r.referencia)}
        {fila("Consecutivo",r.consecutivo,true)}
        {fila("SKU",r.sku,true)}
        {fila("Fecha reporte",r.fecha)}
        {fila("Fecha turno",fechaLarga(getFechaISO(r))||r.fechaTurno)}
        {fila("Turno",r.turno)}
        {fila("Máquina",r.maquina)}
        {fila("Operario",r.nombre)}
        {fila("Cargo",r.cargo)}
        {fila("Hora inicio",r.horaInicio)}
        {fila("Hora final",r.horaFinal)}
        {fila("Unidad",r.unidad)}
        {fila("Peso/unidad",pu>0?pu+" kg":null)}
        {fila("Merma cantidad",r.mermasCantidad)}
        {fila("Merma motivo",r.mermasMotivo)}
        {fila("Tiempos muertos",r.tiemposMuertosMinutos)}
        {fila("Motivo T. muerto",r.tiemposMuertosMotivo)}
        {fila("Medida",r.extraMedida)}
        {fila("Calibre",r.extraCalibre)}
        {fila("Sentido",r.extraSentido)}
        {fila("Rollo inicial",r.extraRolloInicial,true)}
        {fila("Rollo final",r.extraRolloFinal,true)}
        {fila("Rollos totales",r.extraRollosTotales,true)}
        {fila("Rollos producidos",r.extraRollosProducidos,true)}
        {fila("Paquete inicial",r.extraPaqueteInicial,true)}
        {fila("Paquete final",r.extraPaqueteFinal,true)}
        {fila("Unidades/paquete",r.extraUnidadesPorPaquete,true)}

              {String(r.extraRollos).split("//").map((s,i)=>(

      </div>
    </Modal>
  );
}

/* ===== FASE B: PENDIENTES DE INGRESO A SIESA (prioridad, en la parte superior) =====
   Reportes de PRODUCTO TERMINADO que aún no se han confirmado en SIESA. Quedan en
   standby hasta marcarlos; al marcarlos pasan a la Bodega de Inventario. */
function PendientesSiesa({reports, okSet, onToggle, onMarcarTodos}){
  const [buscar,setBuscar]=useState("");
  const [abierto,setAbierto]=useState(true);
  const [detalle,setDetalle]=useState(null); // reporte seleccionado para ver info completa
  const totalPend=reports.filter(r=>requiereSiesa(r) && !okSet.has(reporteId(r))).length;
  const q=buscar.trim().toLowerCase();
  let pend=reports.filter(r=>requiereSiesa(r) && !okSet.has(reporteId(r)));
  if(q) pend=pend.filter(r=>((r.referencia||'')+' '+(r.siesa||'')+' '+(r.maquina||'')+' '+(r.consecutivo||'')+' '+(r.nombre||'')).toLowerCase().includes(q));
  pend=pend.sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(totalPend===0) return (
    <div style={{background:"var(--card)",border:"1px solid var(--line)",borderLeft:"4px solid var(--good)",borderRadius:12,padding:"12px 16px",marginBottom:18,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:18}}>✅</span>
      <div style={{fontSize:13,color:"var(--text-dim)"}}>No hay reportes pendientes de ingreso a SIESA. Toda la producción terminada ya está en la <b>Bodega de Inventario</b>.</div>
    </div>
  );
  const idsVisibles=pend.map(reporteId);
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--amber)",borderLeft:"4px solid var(--amber)",borderRadius:12,marginBottom:18,boxShadow:"0 1px 6px rgba(217,119,6,0.12)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",cursor:"pointer"}} onClick={()=>setAbierto(!abierto)}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20}}>⏳</span>
          <div>
            <div style={{fontWeight:700,fontSize:14,fontFamily:"var(--head)"}}>Pendientes de ingreso a SIESA <span style={{background:"var(--amber)",color:"#fff",borderRadius:20,padding:"1px 9px",fontSize:12,marginLeft:6}}>{totalPend}</span></div>
            <div style={{fontSize:11.5,color:"var(--text-dim)",marginTop:2}}>Reportes de producto terminado en <b>standby</b>. Márcalos cuando los ingreses a SIESA para que pasen a la Bodega de Inventario.</div>
          </div>
        </div>
        <span style={{fontSize:13,color:"var(--text-dim)"}}>{abierto?"▲":"▼"}</span>
      </div>
      {abierto && (
        <div style={{padding:"0 16px 14px"}}>
          <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
            <input style={{...inputStyle,fontSize:12,padding:"7px 10px",maxWidth:280}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar referencia, código, máquina…"/>
            <button onClick={()=>onMarcarTodos(idsVisibles)} style={{background:"var(--good)",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>✓ Marcar {q?`los ${pend.length} visibles`:"todos"} como ingresados</button>
          </div>
          <div style={{overflowX:"auto",overflowY:"auto",maxHeight:320,border:"1px solid var(--line)",borderRadius:10,background:"var(--panel-2)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
              <thead><tr style={{textAlign:"left",borderBottom:"1px solid var(--line)"}}>
                {["✓ SIESA","Fecha","Máquina","Referencia","Producción","Consecutivo"].map(h=><th key={h} style={{padding:"8px 10px",color:"var(--th-text)",fontWeight:700,whiteSpace:"nowrap",position:"sticky",top:0,background:"var(--panel-2)"}}>{h}</th>)}
              </tr></thead>
              <tbody>
                {pend.slice(0,400).map((r,i)=>{
                  const id=reporteId(r);
                  return (
                    <tr key={id||i} onClick={()=>setDetalle(r)} style={{borderTop:"1px solid var(--line)",cursor:"pointer"}} title="Clic para ver información completa del reporte">
                      <td style={{padding:"7px 10px",textAlign:"center"}} onClick={e=>e.stopPropagation()}><input type="checkbox" checked={false} onChange={()=>onToggle(id)} title="Marcar ingreso a SIESA" style={{width:16,height:16,cursor:"pointer",accentColor:"var(--good)"}}/></td>
                      <td style={{padding:"7px 10px",whiteSpace:"nowrap",fontFamily:"var(--mono)",fontSize:12}}>{r.fecha}</td>
                      <td style={{padding:"7px 10px",whiteSpace:"nowrap"}}>{r.maquina}</td>
                      <td style={{padding:"7px 10px",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.referencia}</td>
                      <td style={{padding:"7px 10px",whiteSpace:"nowrap",fontFamily:"var(--mono)"}}>{r.produccion} {r.unidad}</td>
                      <td style={{padding:"7px 10px",fontFamily:"var(--mono)",fontSize:11,whiteSpace:"nowrap"}}>{r.consecutivo||"-"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          {pend.length>400 && <div style={{fontSize:11,color:"var(--text-dim)",marginTop:6}}>Mostrando 400 de {pend.length}. Usa el buscador para acotar.</div>}
        </div>
      )}
      {detalle && <DetalleReporteModal r={detalle} onClose={()=>setDetalle(null)}/>}
    </div>
  );
}

/* ===== AJUSTE DE INVENTARIO (salida con causa) ===== */
const MOTIVOS_AJUSTE=[
  'Devolución a cliente','Producto dañado / no conforme',
  'Ajuste de inventario','Traslado interno','Otro'
];
function AjusteForm({siesa, referencia, disponible, onClose, onSaved}){
  const hoy=new Date().toISOString().slice(0,10);
  const [f,setF]=useState({fecha:hoy, cantidad:'', motivo:MOTIVOS_AJUSTE[0], motivoOtro:'', observaciones:''});
  const [msg,setMsg]=useState('');
  const maxDisp=Math.round(disponible||0);
  function guardar(e){
    e.preventDefault();
    const cant=Number(f.cantidad);
    if(!cant||cant<=0){ setMsg('La cantidad debe ser mayor que 0.'); return; }
    if(cant>maxDisp){ setMsg('No puedes restar más que el disponible ('+maxDisp.toLocaleString()+' und).'); return; }
    const motivoFinal=f.motivo==='Otro'?(f.motivoOtro.trim()||'Otro'):f.motivo;
    if(f.motivo==='Otro'&&!f.motivoOtro.trim()){ setMsg('Describe el motivo.'); return; }
    registrarAjuste({fecha:f.fecha, siesa:String(siesa), referencia, cantidad:cant, motivo:motivoFinal, observaciones:f.observaciones.trim()});
    onSaved&&onSaved(); onClose&&onClose();
  }
  const lab={fontSize:11,fontWeight:600,color:'var(--text-dim)',textTransform:'uppercase',marginBottom:4};
  return(
    <Modal title={'✂️ Ajuste de salida · '+((referencia||'').slice(0,40))} onClose={onClose}>
      <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:14}}>
        Código: <b style={{fontFamily:'var(--mono)'}}>{siesa}</b> · Disponible actual: <b style={{color:'var(--amber)'}}>{maxDisp.toLocaleString()} und</b><br/>
        Esta operación <b>resta unidades permanentemente</b> del inventario y queda registrada con causa.
      </div>
      <form onSubmit={guardar} style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div><div style={lab}>Fecha del ajuste</div><input type="date" style={inputStyle} value={f.fecha} onChange={e=>setF({...f,fecha:e.target.value})}/></div>
        <div>
          <div style={lab}>Cantidad a restar * (máx. {maxDisp.toLocaleString()})</div>
          <input type="number" min="1" max={maxDisp} style={inputStyle} value={f.cantidad} onChange={e=>setF({...f,cantidad:e.target.value})} placeholder={maxDisp.toLocaleString()}/>
        </div>
        <div style={{gridColumn:'1/-1'}}>
          <div style={lab}>Motivo *</div>
          <select style={inputStyle} value={f.motivo} onChange={e=>setF({...f,motivo:e.target.value})}>
            {MOTIVOS_AJUSTE.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        {f.motivo==='Otro' && (
          <div style={{gridColumn:'1/-1'}}><div style={lab}>Describe el motivo *</div><input style={inputStyle} value={f.motivoOtro} onChange={e=>setF({...f,motivoOtro:e.target.value})} placeholder="Ej: Envío a muestras, faltante en conteo…"/></div>
        )}
        <div style={{gridColumn:'1/-1'}}><div style={lab}>Observaciones (opcional)</div><input style={inputStyle} value={f.observaciones} onChange={e=>setF({...f,observaciones:e.target.value})} placeholder="Detalles adicionales"/></div>
        <div style={{gridColumn:'1/-1',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
          <span style={{fontSize:12,color:'var(--bad)'}}>{msg}</span>
          <button type="submit" style={{background:'var(--bad)',color:'#fff',border:'none',borderRadius:8,padding:'9px 20px',fontWeight:700,cursor:'pointer'}}>✂️ Confirmar ajuste</button>
        </div>
      </form>
    </Modal>
  );
}

  const [fDesde,setFDesde]=useState('');
  const [fHasta,setFHasta]=useState('');

  if(fDesde) list=list.filter(a=>(a.fecha||'')>=fDesde);
  if(fHasta) list=list.filter(a=>(a.fecha||'')<=fHasta);

        <InvCard label="Unidades restadas" value={Math.round(totRest).toLocaleString()} color="var(--bad)"/>
        <InvCard label="Referencias afectadas" value={new Set(list.map(a=>a.siesa)).size.toLocaleString()} color="var(--amber)"/>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
        <input style={{...selStyle,maxWidth:280}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar código, referencia, motivo…"/>
        <select style={{...selStyle,maxWidth:200}} value={fMotivo} onChange={e=>setFMotivo(e.target.value)}>{motivos.map(m=><option key={m} value={m}>{m}</option>)}</select>
        <input type="date" style={{...selStyle,maxWidth:145}} value={fDesde} onChange={e=>setFDesde(e.target.value)} title="Desde"/>
        <input type="date" style={{...selStyle,maxWidth:145}} value={fHasta} onChange={e=>setFHasta(e.target.value)} title="Hasta"/>
        {(fMotivo!=='Todos'||fDesde||fHasta) && <button onClick={()=>{setFMotivo('Todos');setFDesde('');setFHasta('');}} style={{background:'#FEE2E2',color:'var(--bad)',border:'none',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>✕ Limpiar</button>}
        <span style={{fontSize:11.5,color:'var(--text-dim)'}}>↕ toca encabezado para ordenar</span>
      </div>
      <div style={{overflowX:'auto',overflowY:'auto',maxHeight:440,border:'1px solid var(--line)',borderRadius:12,background:'var(--card)',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12.5}}>
          <thead><tr style={{background:'var(--panel-2)',textAlign:'left',borderBottom:'1px solid var(--line)'}}>
            <ThSort label="Fecha" k="fecha" sort={sort}/>
            <ThSort label="Código" k="siesa" sort={sort}/>
            <ThSort label="Referencia" k="referencia" sort={sort}/>
            <ThSort label="Cant. restada" k="cantidad" sort={sort}/>
            <ThSort label="Motivo" k="motivo" sort={sort}/>
            <th style={{padding:'9px 10px',color:'var(--th-text)',fontWeight:700,whiteSpace:'nowrap',position:'sticky',top:0,background:'var(--panel-2)'}}>Observaciones</th>
          </tr></thead>
          <tbody>
            {list.map((a,i)=>(
              <tr key={a.id||i} style={{borderTop:'1px solid var(--line)'}}>
                <td style={{padding:'8px 10px',fontFamily:'var(--mono)',whiteSpace:'nowrap'}}>{fechaLarga(a.fecha)||a.fecha||'-'}</td>
                <td style={{padding:'8px 10px',fontFamily:'var(--mono)',fontSize:12}}>{a.siesa||'-'}</td>
                <td style={{padding:'8px 10px',whiteSpace:'nowrap'}}>{a.referencia||'-'}</td>
                <td style={{padding:'8px 10px',fontFamily:'var(--mono)',fontWeight:700,color:'var(--bad)'}}>-{Math.round(Number(a.cantidad)||0).toLocaleString()}</td>
                <td style={{padding:'8px 10px'}}><span style={{background:'rgba(220,38,38,0.1)',color:'var(--bad)',borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:600}}>{a.motivo||'-'}</span></td>
                <td style={{padding:'8px 10px',color:'var(--text-dim)',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.observaciones||'-'}</td>
              </tr>
            ))}
            {list.length===0 && <tr><td colSpan="6" style={{padding:18,textAlign:'center',color:'var(--text-dim)'}}>No hay ajustes registrados.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ===== FASE C: BODEGA DE INVENTARIO (solo lo confirmado en SIESA, antesala de Despachos) ===== */
function BodegaInventario({reports, okSet}){
  const [subTab,setSubTab]=useState('inv');
  const [buscar,setBuscar]=useState("");
  const [fCategoria,setFCategoria]=useState("Todas");
  const [fSector,setFSector]=useState("Todos");
  const [fCliente,setFCliente]=useState("Todos");
  const [showFilter,setShowFilter]=useState(false);
  const [traza,setTraza]=useState(null);
  const [ajustando,setAjustando]=useState(null); // {siesa,referencia,disponible}
  const [ver,setVer]=useState(0);
  const sort=useSort('unidades','desc');
  const selStyle={...inputStyle,fontSize:12,padding:"7px 10px"};
  // Inventario físico del corte + producción confirmada posterior al corte.
  const invAll=inventarioBodegaPT(reports, okSet); ver;
  const categorias=["Todas",...new Set(invAll.map(x=>x.categoria).filter(c=>c&&c!=="-"))].sort();
  const sectores=["Todos",...new Set(invAll.map(x=>x.sector).filter(s=>s&&s!=="-"))].sort();
  const clientesInv=["Todos",...new Set(invAll.map(x=>clienteDe(x.siesa)).filter(Boolean))].sort();
  // Filtros (afectan tarjetas, gráficos y lista)
  let inv=invAll;
  if(fCategoria!=="Todas") inv=inv.filter(x=>x.categoria===fCategoria);
  if(fSector!=="Todos") inv=inv.filter(x=>(x.sector||"-")===fSector);
  if(fCliente!=="Todos") inv=inv.filter(x=>clienteDe(x.siesa)===fCliente);
  if(buscar.trim()) inv=inv.filter(x=>((x.referencia||"")+" "+(x.siesa||"")+" "+(clienteDe(x.siesa)||"")).toLowerCase().includes(buscar.trim().toLowerCase()));
  const totalUnd=inv.reduce((s,x)=>s+x.unidades,0);
  const totalKg=inv.reduce((s,x)=>s+x.kg,0);
  const nCat=new Set(inv.map(x=>x.categoria).filter(c=>c&&c!=="-")).size;
  const pendientes=reports.filter(r=>requiereSiesa(r) && !okSet.has(reporteId(r))).length;
  const activeF=[fCategoria!=="Todas",fSector!=="Todos",fCliente!=="Todos"].filter(Boolean).length;
  const clearF=()=>{setFCategoria("Todas");setFSector("Todos");setFCliente("Todos");};
  const getV=(x,k)=> k==='siesa'?(x.siesa||'') : k==='referencia'?(x.referencia||'') : k==='cliente'?(clienteDe(x.siesa)||'') : k==='categoria'?(x.categoria||'') : k==='sector'?(x.sector||'') : k==='unidades'?(x.unidades||0) : k==='kg'?(x.kg||0) : k==='reportes'?(x.reportes||0) : k==='ultima'?(x.ultima||'') : '';
  const invOrden=aplicarOrden(inv, sort, getV);
  // Datos de gráficos
  const kgPorCat={}; inv.forEach(x=>{ const c=x.categoria||"—"; kgPorCat[c]=(kgPorCat[c]||0)+x.kg; });
  const pieCat=Object.entries(kgPorCat).map(([label,val])=>({label,val:Math.round(val)})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val);
  const topRefs=[...inv].sort((a,b)=>b.kg-a.kg).slice(0,10).map(x=>({label:(x.referencia||x.siesa||"").slice(0,22),val:Math.round(x.kg)})).filter(d=>d.val>0);
  return (
    <div style={{marginBottom:26}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4,fontFamily:"var(--head)"}}>🏬 Bodega de Inventario <span style={{fontSize:12,fontWeight:500,color:"var(--text-dim)"}}>(confirmado en SIESA · listo para despacho)</span></div>
      <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:12}}>Inventario físico del <b>corte (17/07)</b> + producción confirmada en SIESA <b>posterior al corte</b>. Antesala de <b>Despachos</b>. Clic en una referencia para ver su <b>trazabilidad de producción</b>.{pendientes>0 && <span> · <span style={{color:"var(--amber)"}}>⏳ {pendientes} reporte(s) en standby</span> (arriba).</span>}</div>

      {/* SUB-PESTAÑAS */}
      <div style={{display:"flex",gap:1,background:"var(--panel-2)",borderRadius:10,padding:3,border:"1px solid rgba(0,0,0,0.07)",marginBottom:18,width:"fit-content"}}>
        {[['inv','📦 Inventario ('+invAll.length+')'],['ajustes','✂️ Ajustes ('+loadAjustes().length+')']].map(([k,label])=>(
          <button key={k} onClick={()=>setSubTab(k)} style={{background:subTab===k?"var(--card)":"transparent",color:subTab===k?"var(--text)":"var(--text-dim)",border:"none",borderRadius:8,padding:"7px 16px",fontWeight:subTab===k?600:500,fontSize:13,cursor:"pointer",boxShadow:subTab===k?"0 1px 2px rgba(0,0,0,0.06)":"none"}}>{label}</button>
        ))}
      </div>

      {subTab==='ajustes' && <HistorialAjustes key={"haj_"+ver}/>}
      {subTab==='inv' && <>

      {/* 1) TARJETAS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:18}}>
        <InvCard label="Referencias" value={inv.length.toLocaleString()} color="var(--accent)"/>
        <InvCard label="Unidades confirmadas" value={Math.round(totalUnd).toLocaleString()} color="var(--good)"/>
        <InvCard label="Peso confirmado" value={Math.round(totalKg).toLocaleString()+" kg"} color="var(--good)"/>
        <InvCard label="Categorías" value={nCat.toLocaleString()} color="var(--brand-blue)"/>
        <InvCard label="Pendientes (standby)" value={pendientes.toLocaleString()} color={pendientes===0?"var(--good)":"var(--amber)"} sub={pendientes===0?"Todo ingresado":"Por ingresar a SIESA"}/>
      </div>

      {/* 2) GRÁFICOS */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
        <PieChart data={pieCat} title="Inventario por categoría (kg)"/>
        <BarChartDash data={topRefs} title="Top 10 referencias por peso" sub="Eje X: referencia" color="var(--good)" labelKey="label" valueKey="val" unidad="kg"/>
      </div>

      {/* 3) FILTROS + BUSCADOR */}
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>

        <button onClick={()=>setShowFilter(!showFilter)} style={{background:showFilter||activeF>0?"var(--accent)":"var(--panel-2)",color:showFilter||activeF>0?"#fff":"var(--text-dim)",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{showFilter?"▲ Ocultar":"▼ Filtrar"}{activeF>0?` (${activeF})`:""}</button>
      </div>
      {showFilter && (
        <div style={{background:"var(--card)",border:"1px solid var(--line)",borderRadius:12,padding:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
          <div><div style={{fontSize:11,fontWeight:600,color:"var(--text-dim)",textTransform:"uppercase",marginBottom:5}}>Categoría / Tipo</div><select style={{...inputStyle,fontSize:13}} value={fCategoria} onChange={e=>setFCategoria(e.target.value)}>{categorias.map(c=><option key={c} value={c}>{c}</option>)}</select></div>

function Despachos({reports, okSet}){
  const [subTab,setSubTab]=useState('activos');

  const [fCliente,setFCliente]=useState("Todos");

    const yaDespachado=totalDespachado(p.pedido, p.item);
    const pendReal=Math.max(0,(Number(p.pendiente)||0)-yaDespachado);
    return {...p, _idx:idx, estado:estadoPedido(p.fecha), dias:diasMontaje(p.fecha), yaDespachado, pendReal};
  });
  const todos=all;
  const activos=all.filter(p=>p.pendReal>0);
  const pool={}; Object.keys(disp).forEach(k=>{ pool[k]=disp[k].unidades; });
  [...activos].sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||'')||a._idx-b._idx).forEach(p=>{
    const key=String(p.item).trim(), avail=pool[key]!=null?pool[key]:0;
    const asign=Math.max(0,Math.min(p.pendReal,avail));
    p.dispAsignado=Math.round(asign); if(pool[key]!=null) pool[key]=avail-asign;
    p.dispTotal=Math.round(disp[key]?disp[key].unidades:0);
    p.alcanza=asign>=p.pendReal&&p.pendReal>0; p.parcial=asign>0&&asign<p.pendReal;
  });
  const clientes=["Todos",...new Set(activos.map(p=>p.cliente).filter(Boolean))].sort();
  const estados=["Todos",...new Set(activos.map(p=>p.estado).filter(Boolean))].sort();

  const getV=(p,k)=> k==='fecha'?(p.fecha||''):k==='pedido'?(p.pedido||''):k==='cliente'?(p.cliente||''):k==='item'?(p.item||''):k==='resumen'?(p.resumen||''):k==='estado'?(p.estado||''):k==='pedida'?(Number(p.pedida)||0):k==='pendReal'?p.pendReal:k==='asignado'?(p.dispAsignado||0):k==='cobertura'?(p.alcanza?2:p.parcial?1:0):'';
  list=aplicarOrden(list,sort,getV);
  const totPend=list.reduce((s,p)=>s+p.pendReal,0), totPed=list.reduce((s,p)=>s+(Number(p.pedida)||0),0);
  const nClientes=new Set(list.map(p=>p.cliente)).size, conInv=list.filter(p=>p.alcanza).length;

  const pieEstado=Object.entries(porEstado).map(([label,val])=>({label,val})).filter(d=>d.val>0);
  const porCli={}; list.forEach(p=>{const c=p.cliente||'—';porCli[c]=(porCli[c]||0)+p.pendReal;});
  const topCli=Object.entries(porCli).map(([l,v])=>({label:String(l).slice(0,20),val:Math.round(v)})).filter(d=>d.val>0).sort((a,b)=>b.val-a.val).slice(0,10);
  const activeF=[fCliente!=="Todos",fEstado!=="Todos",fInv!=="Todos",!!fDesde,!!fHasta].filter(Boolean).length;
  const nDesp=loadDespachos().length; ver;
  return (

/* ===== CONSUMO DE LÁMINA (extrusión produce → impresión consume) ===== */
function ConsumosLamina({reports}){
  const [buscar,setBuscar]=useState("");
  const [fMaterial,setFMaterial]=useState("Todos");
  const [soloDef,setSoloDef]=useState(false);
  const sort=useSort('saldo','desc');
  const bal=balanceLamina(reports);
  const materiales=["Todos",...new Set(bal.map(x=>x.material).filter(Boolean))].sort();
  let list=bal;
  if(fMaterial!=="Todos") list=list.filter(x=>x.material===fMaterial);
  if(soloDef) list=list.filter(x=>x.saldo<0);
  if(buscar.trim()){ const q=buscar.trim().toLowerCase(); list=list.filter(x=>(x.material+" "+x.medida+" "+x.color).toLowerCase().includes(q)); }
  const getV=(x,k)=> k==='material'?(x.material||'') : k==='medida'?(Number(x.medida)||0) : k==='color'?(x.color||'') : k==='inicial'?x.inicial : k==='producido'?x.producido : k==='consumido'?x.consumido : k==='saldo'?x.saldo : '';
  list=aplicarOrden(list, sort, getV);
  const totIni=bal.reduce((s,x)=>s+x.inicial,0);
  const totProd=bal.reduce((s,x)=>s+x.producido,0);
  const totCons=bal.reduce((s,x)=>s+x.consumido,0);
  const totSaldo=bal.reduce((s,x)=>s+x.saldo,0);
  const deficit=bal.filter(x=>x.saldo<0).length;
  const selStyle={...inputStyle,fontSize:12,padding:"7px 10px"};
  const barSaldo=[...bal].sort((a,b)=>b.saldo-a.saldo).slice(0,12).map(x=>({label:(x.material.slice(0,4)+" "+x.medida+(x.color?(" "+x.color[0]):"")),val:Math.round(x.saldo)})).filter(d=>d.val!==0);
  return (
    <div style={{marginBottom:26}}>
      <div style={{fontSize:15,fontWeight:700,marginBottom:4,fontFamily:"var(--head)"}}>🔄 Consumo de lámina <span style={{fontSize:12,fontWeight:500,color:"var(--text-dim)"}}>(extrusión produce · impresión consume)</span></div>
      <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:14}}>Balance por <b>tipo + medida</b> de lámina. El consumo se descuenta al <b>imprimir</b> cada referencia (Kg producidos + merma), según la lámina que necesita en el maestro de SKU. <b>Saldo = inventario inicial (corte) + producido − consumido.</b></div>
      {/* 1) TARJETAS */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:18}}>
        <InvCard label="Familias de lámina" value={bal.length.toLocaleString()} color="var(--accent)"/>
        <InvCard label="Inicial (corte)" value={Math.round(totIni).toLocaleString()+" kg"} color="var(--brand-blue)"/>
        <InvCard label="Producido (extrusión)" value={Math.round(totProd).toLocaleString()+" kg"} color="var(--good)"/>
        <InvCard label="Consumido (impresión)" value={Math.round(totCons).toLocaleString()+" kg"} color="var(--amber)"/>
        <InvCard label="Saldo disponible" value={Math.round(totSaldo).toLocaleString()+" kg"} color={totSaldo>=0?"var(--good)":"var(--bad)"} sub={deficit>0?deficit+" familia(s) en déficit":"Todo con saldo"}/>
      </div>
      {/* 2) GRÁFICO */}
      <div style={{marginBottom:18}}>
        <BarChartDash data={barSaldo} title="Saldo de lámina por familia (top)" sub="Eje X: tipo+medida" color="var(--good)" labelKey="label" valueKey="val" unidad="kg"/>
      </div>
      {/* 3) LISTA */}
      <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
        <input style={{...selStyle,maxWidth:280}} value={buscar} onChange={e=>setBuscar(e.target.value)} placeholder="Buscar tipo o medida…"/>
        <select style={{...selStyle,maxWidth:170}} value={fMaterial} onChange={e=>setFMaterial(e.target.value)}>{materiales.map(m=><option key={m} value={m}>{m==="Todos"?"Todos los tipos":m}</option>)}</select>
        <button onClick={()=>setSoloDef(!soloDef)} style={{background:soloDef?"var(--bad)":"var(--panel-2)",color:soloDef?"#fff":"var(--text-dim)",border:"1px solid var(--line)",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>{soloDef?"● Solo en déficit":"○ Solo en déficit"}</button>
      </div>
      <div style={{overflowX:"auto",overflowY:"auto",maxHeight:460,border:"1px solid var(--line)",borderRadius:12,background:"var(--card)",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
          <thead><tr style={{background:"var(--panel-2)",textAlign:"left",borderBottom:"1px solid var(--line)"}}>
            <ThSort label="Tipo" k="material" sort={sort}/>
            <ThSort label="Medida" k="medida" sort={sort}/>
            <ThSort label="Color" k="color" sort={sort}/>
            <ThSort label="Inicial (kg)" k="inicial" sort={sort}/>
            <ThSort label="Producido (kg)" k="producido" sort={sort}/>
            <ThSort label="Consumido (kg)" k="consumido" sort={sort}/>
            <ThSort label="Saldo (kg)" k="saldo" sort={sort}/>
          </tr></thead>
          <tbody>
            {list.map((x,i)=>(
              <tr key={i} style={{borderTop:"1px solid var(--line)",background:x.saldo<0?"rgba(220,38,38,0.06)":"transparent"}}>
                <td style={{padding:"8px 10px",fontWeight:600}}>{x.material}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)"}}>{x.medida} cm</td>
                <td style={{padding:"8px 10px",fontSize:12,color:"var(--text-dim)"}}>{x.color||"-"}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)"}}>{Math.round(x.inicial).toLocaleString()}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",color:"var(--good)"}}>{Math.round(x.producido).toLocaleString()}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",color:"var(--amber)"}}>{Math.round(x.consumido).toLocaleString()}</td>
                <td style={{padding:"8px 10px",fontFamily:"var(--mono)",fontWeight:700,color:x.saldo<0?"var(--bad)":"var(--good)"}}>{Math.round(x.saldo).toLocaleString()}</td>
              </tr>
            ))}
            {list.length===0 && <tr><td colSpan="7" style={{padding:18,textAlign:"center",color:"var(--text-dim)"}}>Sin datos de lámina.</td></tr>}
          </tbody>
        </table>
      </div>
      <div style={{fontSize:11,color:"var(--text-dim)",marginTop:8}}>Nota: el consumo se toma de la <b>impresión</b>. Un saldo negativo indica que se imprimió más de lo que hay registrado como producido+corte en esa familia (revisar corte o producción de extrusión).</div>
    </div>
  );
}

/* Exportación reutilizable: exporta la lista que se le pase (todo o filtrado). */
function exportReportesXLSX(list, filename){
  const headers=["Fecha","F.Turno","Nombre","Cargo","Maquina","H.Inicio","H.Final","Turno","Siesa","SKU","Referencia","Unidad","Produccion","Merma Cant.","Merma Motivo","T.M. Min","T.M. Motivo","Bodega","Categoria","Sector","% Util.","Rend. Real","% Rend.","Consecutivo","Observaciones"];
  const metas=loadMetas();
  const rows=list.map(r=>{
    const c=clasificarReporte(r), u=calcUtilizacion(r), rd=calcRendimiento(r,metas);
    return [r.fecha,r.fechaTurno,r.nombre,r.cargo,r.maquina,r.horaInicio,r.horaFinal,r.turno,r.siesa,r.sku,r.referencia,r.unidad,r.produccion,r.mermasCantidad,r.mermasMotivo,r.tiemposMuertosMinutos,r.tiemposMuertosMotivo,c.bodega,c.categoria,c.sector,u?u.utilizacion+"%":"-",rd?rd.rendReal+" "+rd.unidad:"-",rd?rd.pct+"%":"-",r.consecutivo,r.observaciones];
  });
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Reportes");
  XLSX.writeFile(wb,filename||"reportes_produccion.xlsx");
}

function LastUpdated({ts}){
  const [,tick]=useState(0);
  useEffect(()=>{const id=setInterval(()=>tick(n=>n+1),30000);return ()=>clearInterval(id);},[]);
  if(!ts) return null;
  const s=Math.floor((Date.now()-ts)/1000);
  const txt=s<45?"hace instantes":s<90?"hace 1 min":s<3600?`hace ${Math.floor(s/60)} min`:s<7200?"hace 1 h":`hace ${Math.floor(s/3600)} h`;
  return <span style={{fontSize:11.5,color:"var(--text-dim)",whiteSpace:"nowrap"}}>🕒 Actualizado {txt}</span>;
}

      </>}
      {tab==='bodegas' && <>
        <div style={{display:"flex",gap:1,background:"var(--panel-2)",borderRadius:10,padding:3,border:"1px solid rgba(0,0,0,0.07)",marginBottom:18,width:"fit-content"}}>
          {[['pt','📦 Producto Terminado'],['pp','⚙️ Producto en Proceso']].map(([k,label])=>(
            <button key={k} onClick={()=>setSubBodega(k)} style={{background:subBodega===k?"var(--card)":"transparent",color:subBodega===k?"var(--text)":"var(--text-dim)",border:"none",borderRadius:8,padding:"7px 16px",fontWeight:subBodega===k?600:500,fontSize:13,cursor:"pointer",boxShadow:subBodega===k?"0 1px 2px rgba(0,0,0,0.06)":"none"}}>{label}</button>
          ))}
        </div>
        {subBodega==='pt' && <div className="fade-in" key={"spt_"+metasVer}><InventarioFisico bodega="pt" reports={reports}/><InventarioPT reports={reports}/><BodegaView reports={reports} titulo="Producto Terminado" showFiltros={true}/></div>}
        {subBodega==='pp' && <div className="fade-in" key={"spp_"+metasVer}><InventarioFisico bodega="pp" reports={reports}/><InventarioRollos reports={reports}/><BodegaView reports={reports} titulo="Producto en Proceso" showFiltros={false}/></div>}
      </>}
      </div>
    </div>
  );
}

function ThemeToggle({theme,setTheme}){
  const dark=theme==="dark";
  return (
    <button onClick={()=>setTheme(dark?"light":"dark")} title={dark?"Cambiar a modo claro":"Cambiar a modo oscuro"}
      style={{background:"var(--panel-2)",border:"1px solid var(--line)",borderRadius:20,padding:"6px 12px",cursor:"pointer",fontSize:13,color:"var(--text)",display:"flex",alignItems:"center",gap:6,fontWeight:600}}>
      <span style={{fontSize:14}}>{dark?"☀️":"🌙"}</span><span style={{fontSize:12}}>{dark?"Claro":"Oscuro"}</span>
    </button>
  );
}

function App(){
  const [catalog,setCatalog]=useState(loadCatalog());
  const [machines,setMachines]=useState(loadMachines());
  const [reports,setReports]=useState([]);
  const [unlocked,setUnlocked]=useState(false);
  const [loading,setLoading]=useState(false);
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem('tema-panel')||'light';}catch(e){return 'light';}});
  const [lastUpdated,setLastUpdated]=useState(null);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);try{localStorage.setItem('tema-panel',theme);}catch(e){}},[theme]);

  async function refreshReports(){
    setLoading(true);
    const cfg=await loadConfigRemoto(SHEETS_URL_READ); // config compartida desde el Sheet
    await migrarConfigInicial(cfg);                    // sube lo local si el Sheet aún no lo tiene
    setCatalog(loadCatalog()); setMachines(loadMachines());
    const data=await loadReports(SHEETS_URL_READ, window.__AUTH_PIN); // lectura con PIN
    setReports(data);
    setLastUpdated(Date.now());
    setLoading(false);
  }
  useEffect(()=>{ if(unlocked) refreshReports(); },[unlocked]);

  return(
    <div id="app-root">
      <header style={{background:"var(--header-bg)",borderBottom:"3px solid var(--brand-blue)",boxShadow:"0 3px 0 0 var(--brand-green)",padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
        <Logo/>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {unlocked && loading && <span style={{fontSize:12,color:"var(--text-dim)"}}>Cargando…</span>}
          <ThemeToggle theme={theme} setTheme={setTheme}/>
        </div>
      </header>
      {unlocked
        ? <PanelView catalog={catalog} setCatalog={setCatalog} machines={machines} setMachines={setMachines} reports={reports} refreshReports={refreshReports} lastUpdated={lastUpdated}/>
        : <PinGate onUnlock={(p)=>{ window.__AUTH_PIN=p; setUnlocked(true); }}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app-root')).render(<App/>);
</script>
</body>
</html>
